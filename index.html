    76:{g:[{t:"JPN",p:"Kaishu Sano",m:"29"},{t:"BRA",p:"Casemiro",m:"56"},{t:"BRA",p:"Gabriel Martinelli",m:"90+5"}],r:[],s:"Japan led through Kaishu Sano's first-half strike, but Casemiro headed Brazil level after the break and substitute Gabriel Martinelli curled in a stoppage-time winner to complete a 2–1 comeback and send Brazil into the Round of 16."},
    77:{g:[{t:"FRA",p:"Kylian Mbappé",m:"45"},{t:"FRA",p:"Bradley Barcola",m:"53"},{t:"FRA",p:"Kylian Mbappé",m:"74"}],r:[],s:"Kylian Mbappé struck either side of a Bradley Barcola goal as France cruised past Sweden 3–0 in New Jersey. Mbappé's brace took him to six goals at the tournament, level with Lionel Messi, and set up a Round-of-16 tie with Paraguay."},
    78:{g:[{t:"NOR",p:"Antonio Nusa",m:"39"},{t:"CIV",p:"Amad Diallo",m:"74"},{t:"NOR",p:"Erling Haaland",m:"86"}],r:[],s:"Antonio Nusa put Norway ahead before Amad Diallo levelled for Ivory Coast, but Erling Haaland tapped in Sander Berge's cross in the 86th minute to earn Norway their first-ever World Cup knockout win and a Round-of-16 clash with Brazil."},
    79:{g:[{t:"MEX",p:"Julián Quiñones",m:"22"},{t:"MEX",p:"Raúl Jiménez",m:"31"}],r:[],s:"Julián Quiñones and Raúl Jiménez struck inside the first half-hour at a raucous Estadio Azteca as Mexico beat Ecuador 2–0 to win their first World Cup knockout match since 1986. Mexico advance to face the winner of England vs DR Congo."},
    80:{g:[{t:"COD",p:"Brian Cipenga",m:"7"},{t:"ENG",p:"Harry Kane",m:"75"},{t:"ENG",p:"Harry Kane",m:"86"}],r:[],s:"Brian Cipenga's early strike put DR Congo ahead in Atlanta, but Harry Kane's second-half brace — a 75th-minute header and an 86th-minute strike into the top corner — completed a 2–1 comeback that sends England into a last-16 tie with hosts Mexico."},
    81:{g:[{t:"USA",p:"Folarin Balogun",m:"45"},{t:"USA",p:"Malik Tillman",m:"81"}],r:[{t:"USA",p:"Folarin Balogun",m:"64"}],s:"Folarin Balogun's first-half strike put the USA ahead before his 64th-minute red card for serious foul play left the hosts a man down, but Malik Tillman's superb 81st-minute free-kick sealed a 2–0 win — the USA's first World Cup knockout victory since 2002 — and a Round-of-16 date with Belgium."},
    82:{g:[{t:"SEN",p:"Habib Diarra",m:"25"},{t:"SEN",p:"Ismaïla Sarr",m:"51"},{t:"BEL",p:"Romelu Lukaku",m:"86"},{t:"BEL",p:"Youri Tielemans",m:"89"},{t:"BEL",p:"Youri Tielemans",m:"120+5",type:"pen"}],r:[],s:"Senegal led 2–0 through Habib Diarra's 25th-minute rebound and Ismaïla Sarr early in the second half, but Romelu Lukaku (86') and Youri Tielemans (89') struck late to force extra time, where Tielemans slotted home a heavily VAR-delayed penalty deep in the second period to complete a dramatic 3–2 comeback and set up a last-16 meeting with the USA."},
    83:{g:[{t:"CRO",p:"Ivan Perišić",m:"53"},{t:"POR",p:"Cristiano Ronaldo",m:"68",type:"pen"},{t:"POR",p:"Gonçalo Ramos",m:"90+4"}],r:[],s:"Ivan Perišić lashed Croatia ahead early in the second half, but Cristiano Ronaldo levelled from the penalty spot after Nikola Vlašić fouled Renato Veiga, and Gonçalo Ramos headed a stoppage-time winner from Rafael Leão's cross to send Portugal into a last-16 meeting with Spain."},
    84:{g:[{t:"ESP",p:"Mikel Oyarzabal",m:"36"},{t:"ESP",p:"Pedro Porro",m:"66"},{t:"ESP",p:"Mikel Oyarzabal",m:"88"}],r:[],s:"Mikel Oyarzabal struck either side of a Pedro Porro header — both his goals laid on by Marc Cucurella — as Spain cruised past Austria for their first World Cup knockout win since their 2010 title, setting up a Round-of-16 clash with Portugal."},
    85:{g:[{t:"SUI",p:"Breel Embolo",m:"10"},{t:"SUI",p:"Dan Ndoye",m:"46"}],r:[],s:"Breel Embolo steered in Johan Manzambi's low cross inside ten minutes and Dan Ndoye drilled home moments after the break to earn Switzerland a 2–0 win — their first World Cup knockout victory in 88 years — and a Round-of-16 tie against Colombia or Ghana."},
    86:{g:[{t:"ARG",p:"Lionel Messi",m:"29"},{t:"CPV",p:"Deroy Duarte",m:"59"},{t:"ARG",p:"Lisandro Martínez",m:"92"},{t:"CPV",p:"Sidny Lopes Cabral",m:"103"},{t:"ARG",p:"Diney Borges",m:"111",type:"og"}],r:[],s:"Lionel Messi opened the scoring, but World Cup debutants Cape Verde twice hit back through Deroy Duarte and Sidny Lopes Cabral to take the holders to the brink. Lisandro Martínez had restored Argentina's lead in extra time before Cristian Romero's header deflected in off Diney Borges for a 111th-minute own goal to win it 3–2 after extra time."},
    87:{g:[{t:"COL",p:"Jhon Arias",m:"14"}],r:[],s:"Jhon Arias fired home a Luis Suárez cross inside 14 minutes for the only goal in Kansas City, sending Colombia into the Round of 16 to face Switzerland and ending Ghana's campaign."},
    88:{g:[{t:"EGY",p:"Emam Ashour",m:"13"},{t:"AUS",p:"Mohamed Hany",m:"55",type:"og"}],r:[],s:"Emam Ashour put Egypt ahead early before Mohamed Hany turned into his own net to level for Australia. The 1–1 draw held through extra time and Egypt won 4–2 on penalties to reach the last 16 for the first time, inflicting the Socceroos' first-ever World Cup shootout defeat."},
    89:{g:[{t:"FRA",p:"Kylian Mbappé",m:"70",type:"pen"}],r:[],s:"Kylian Mbappé settled a bad-tempered contest in Philadelphia, converting a 70th-minute penalty won by Désiré Doué. France's 1–0 win sends them into the quarter-finals and ends Paraguay's run."},
    90:{g:[{t:"MAR",p:"Azzedine Ounahi",m:"50"},{t:"MAR",p:"Azzedine Ounahi",m:"82"},{t:"MAR",p:"Soufiane Rahimi",m:"90+8"}],r:[],s:"Azzedine Ounahi struck twice either side of the hour and Soufiane Rahimi added a stoppage-time third as Morocco beat Canada in Houston. The co-hosts became the first host nation eliminated, while Morocco advanced to the quarter-finals."},
    91:{g:[{t:"NOR",p:"Erling Haaland",m:"79"},{t:"NOR",p:"Erling Haaland",m:"90"},{t:"BRA",p:"Neymar",m:"90+10",type:"pen"}],r:[],s:"Erling Haaland struck twice late — a 79th-minute header and a low drive in the 90th — to knock out five-time champions Brazil and send Norway to their first-ever World Cup quarter-final. Neymar's stoppage-time penalty was only a consolation after Ørjan Nyland had earlier saved a Bruno Guimarães spot-kick."},
    92:{g:[{t:"ENG",p:"Jude Bellingham",m:"36"},{t:"ENG",p:"Jude Bellingham",m:"38"},{t:"MEX",p:"Julián Quiñones",m:"42"},{t:"ENG",p:"Harry Kane",m:"60",type:"pen"},{t:"MEX",p:"Raúl Jiménez",m:"69",type:"pen"}],r:[{t:"ENG",p:"Jarell Quansah",m:"54"}],s:"Jude Bellingham's two-minute brace put England 2–0 up at the Azteca before Julián Quiñones pulled one back. Harry Kane's penalty restored the cushion and, although Jarell Quansah's 54th-minute red card and a Raúl Jiménez spot-kick set up a tense finish, ten-man England held on to win 3–2 and reach the quarter-finals against Norway."},
    93:{g:[{t:"ESP",p:"Mikel Merino",m:"90+1"}],r:[],s:"Substitute Mikel Merino struck in the first minute of second-half stoppage time, set up by fellow substitute Ferran Torres, to send Spain past a resolute Portugal 1–0 and end Cristiano Ronaldo's final World Cup."},
    94:{g:[{t:"BEL",p:"Charles De Ketelaere",m:"9"},{t:"USA",p:"Malik Tillman",m:"31"},{t:"BEL",p:"Charles De Ketelaere",m:"33"},{t:"BEL",p:"Hans Vanaken",m:"57"},{t:"BEL",p:"Romelu Lukaku",m:"90+3"}],r:[],s:"Charles De Ketelaere struck twice in the first half — his header restoring Belgium's lead just two minutes after Malik Tillman's deflected free-kick had levelled — before a Matt Freese error gifted Hans Vanaken a third and Romelu Lukaku added a stoppage-time fourth. Belgium beat hosts USA 4–1 in Seattle and go on to face Spain in the quarter-finals."},
    95:{g:[{t:"EGY",p:"Yasser Ibrahim",m:"15"},{t:"EGY",p:"Mostafa Zico",m:"67"},{t:"ARG",p:"Cristian Romero",m:"79"},{t:"ARG",p:"Lionel Messi",m:"83"},{t:"ARG",p:"Enzo Fernández",m:"90+2"}],r:[],s:"Egypt led 2–0 through Yasser Ibrahim's header and a Mostafa Zico finish, and looked set for the quarter-finals after Messi had a penalty saved — but Argentina roared back late, Cristian Romero heading in from Messi's cross before Messi equalised himself, and Enzo Fernández's stoppage-time header completed a stunning 3–2 comeback to send the defending champions through."},
    96:{g:[],r:[],s:"Switzerland and Colombia played out a goalless 120 minutes in Vancouver, Jhon Lucumí crashing a header off the crossbar and Jáminton Campaz shooting over an open goal for Colombia in extra time. In the shootout, Davinson Sánchez struck the bar and Cucho Hernández was saved by Gregor Kobel before Rubén Vargas converted the winning kick to send Switzerland through 4–3 on penalties — their first World Cup quarter-final since hosting in 1954."},
    97:{g:[{t:"FRA",p:"Kylian Mbappé",m:"60"},{t:"FRA",p:"Ousmane Dembélé",m:"66"}],r:[],s:"Kylian Mbappé had an early penalty saved by Yassine Bounou, but curled in a brilliant right-footed strike on the hour before Ousmane Dembélé added a second six minutes later to send France past Morocco and into the semi-finals."},
    98:{g:[{t:"ESP",p:"Fabián Ruiz",m:"30"},{t:"BEL",p:"Charles De Ketelaere",m:"41"},{t:"ESP",p:"Mikel Merino",m:"88"}],r:[],s:"Fabián Ruiz pounced on a rebound to put Spain ahead, but Charles De Ketelaere headed Belgium level before the break. Substitute Mikel Merino struck again just two minutes after coming on, turning home a spilled Cubarsí shot to send Spain past Belgium and into a semi-final against France."},
    99:{g:[{t:"NOR",p:"Andreas Schjelderup",m:"36"},{t:"ENG",p:"Jude Bellingham",m:"45+2"},{t:"ENG",p:"Jude Bellingham",m:"93"}],r:[],s:"Andreas Schjelderup put Norway ahead in Miami, but Jude Bellingham levelled right on half-time and struck again three minutes into extra time, pouncing on a goalkeeping error, to send England through to face Argentina in the semi-finals."},
    100:{g:[{t:"ARG",p:"Alexis Mac Allister",m:"10"},{t:"SUI",p:"Dan Ndoye",m:"67"},{t:"ARG",p:"Julián Álvarez",m:"112"},{t:"ARG",p:"Lautaro Martínez",m:"120+1"}],r:[{t:"SUI",p:"Breel Embolo",m:"72"}],s:"Alexis Mac Allister headed in from a Messi corner, but Dan Ndoye levelled midway through the second half to send the game to extra time. Breel Embolo was sent off for a second yellow card, and Argentina made the extra man count as Julián Álvarez's stunner and a late Lautaro Martínez strike sent them past Switzerland into a semi-final against England."}
  };

  /* ============ helpers ============ */
  const WD = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  const MO = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  function dateLabel(iso) {           // "2026-06-11" -> "Thu, Jun 11"
    const dt = new Date(iso + "T12:00:00");
    return WD[dt.getDay()] + ", " + MO[dt.getMonth()] + " " + dt.getDate();
  }
  const shortMD = iso => { const dt = new Date(iso + "T12:00:00"); return MO[dt.getMonth()] + " " + dt.getDate(); };
  function koSlot(s) {
    return s.replace(/^Winner Group /,"Winner ").replace(/^Runner-up Group /,"Runner-up ")
            .replace(/^3rd Group /,"3rd ").replace(/^Winner Match /,"Winner M").replace(/^Loser Match /,"Loser M");
  }

  /* ====== knockout slot resolution: fills "Winner/Loser Match N" as results come in ====== */
  // A slot is a real team abbr, "Winner Match N", or "Loser Match N". Resolve as far as results allow.
  function koScoreParts(m) {                 // [homeGoals, awayGoals] for a played match, else null
    if (!m || m.st !== "played" || !m.s) return null;
    const p = m.s.split("–");
    if (p.length !== 2) return null;
    const h = parseInt(p[0], 10), a = parseInt(p[1], 10);
    return (isNaN(h) || isNaN(a)) ? null : [h, a];
  }
  function slotTeam(s) { const i = slotInfo(s); return i.kind === "team" ? i.abbr : null; }
  function koResult(m) {                      // {win, lose} abbrs for a played knockout match, else null
    if (!m || m.stage === "group" || m.st !== "played") return null;
    const home = slotTeam(m.s1), away = slotTeam(m.s2);
    if (m.w) return { win: m.w, lose: m.w === home ? away : (m.w === away ? home : null) };  // explicit (penalties/draws)
    const sc = koScoreParts(m);
    if (sc && home && away && sc[0] !== sc[1]) return sc[0] > sc[1] ? { win: home, lose: away } : { win: away, lose: home };
    return null;
  }
  function slotInfo(s) {                      // {kind:"team",abbr} | {kind:"pair",a,b,want} | {kind:"placeholder",text}
    if (TEAM[s]) return { kind: "team", abbr: s };
    const mm = /^(Winner|Loser) Match (\d+)$/.exec(s);
    if (mm) {
      const want = mm[1], fm = MByNo[+mm[2]], res = koResult(fm);
      if (res) { const ab = want === "Winner" ? res.win : res.lose; if (ab) return { kind: "team", abbr: ab }; }
      if (fm) { const a = slotTeam(fm.s1), b = slotTeam(fm.s2); if (a && b) return { kind: "pair", a, b, want }; }  // both feeders known
    }
    return { kind: "placeholder", text: koSlot(s) };
  }
  const slotName = (s, full) => { const i = slotInfo(s); return i.kind === "team" ? (full ? TEAM[i.abbr].n : i.abbr) : (i.kind === "pair" ? i.a + "/" + i.b : i.text); };
  const slotFlag = s => { const i = slotInfo(s); return i.kind === "team" ? FLAG(TEAM[i.abbr].c) : ""; };
  const fmt12 = mins => {
    let h = Math.floor(mins/60), m = mins%60, ap = h<12 ? "AM" : "PM", hh = h%12 || 12;
    return hh + ":" + String(m).padStart(2,"0") + " " + ap;
  };
  function timeStr(t24, tz) {          // local + WAT (UTC+1)
    const [H,M] = t24.split(":").map(Number);
    const local = H*60 + M;
    let wat = local - tz*60 + 60, day = 0;
    while (wat >= 1440) { wat -= 1440; day++; }
    while (wat < 0)     { wat += 1440; day--; }
    return fmt12(local) + " (local)  |  " + fmt12(wat) + (day>0 ? " +"+day : "") + " (WAT)";
  }
  const gdClass = gd => /^\+/.test(gd) ? "pos" : /^[−-]/.test(gd) ? "neg" : "zero";

  /* ============ orbit coordinates [top, right, bottom, left] ============ */
  const POS = { top:[145,30], right:[260,145], bottom:[145,260], left:[30,145] };
  const POSKEYS = ["top","right","bottom","left"];
  const nodeCoord = (g, abbr) => POS[POSKEYS[g.layout.indexOf(abbr)]];

  function chipPos(a, b) {
    const mx = (a[0]+b[0])/2, my = (a[1]+b[1])/2;
    if (Math.abs(mx-145) < 1 && Math.abs(my-145) < 1) {
      const node = (a[0]+a[1] <= b[0]+b[1]) ? a : b;
      return [ node[0] + (145-node[0])*0.36, node[1] + (145-node[1])*0.36 ];
    }
    return [mx, my];
  }

  function renderGroup(g) {
    const ms = MATCHES.filter(m => m.stage === "group" && m.grp === g.id);
    let lines = "", chips = "", nodes = "";
    ms.forEach(m => {
      const A = nodeCoord(g, m.h), B = nodeCoord(g, m.a);
      lines += m.st === "played"
        ? `<line x1="${A[0]}" y1="${A[1]}" x2="${B[0]}" y2="${B[1]}" stroke="#d4af37" stroke-width="3.5" stroke-linecap="round"/>`
        : `<line x1="${A[0]}" y1="${A[1]}" x2="${B[0]}" y2="${B[1]}" stroke="#4a5876" stroke-width="2.5" stroke-dasharray="6 5"/>`;
      const cp = chipPos(A, B);
      chips += `<div class="chip ${m.st==='upcoming'?'upc':''}" style="left:${cp[0]}px;top:${cp[1]}px;" data-no="${m.no}"
        data-home="${g.teams[m.h].n}" data-away="${g.teams[m.a].n}" data-score="${m.s==='vs'?'Upcoming':m.s}" data-status="${m.st}"
        data-date="${dateLabel(m.d)}" data-t="${m.t}" data-tz="${m.tz}" data-host="${m.host}" data-venue="${m.v}">${m.s}</div>`;
    });
    POSKEYS.forEach((k, i) => {
      const ab = g.layout[i], tm = g.teams[ab], c = POS[k];
      nodes += `<div class="node" style="left:${c[0]-27}px;top:${c[1]-27}px;">
        <img src="${FLAG(tm.c)}" alt="${ab}"><span class="ab">${ab}</span></div>`;
    });
    let rows = "";
    g.standings.forEach(([ab,pts,gd]) => {
      rows += `<tr><td class="fl"><img src="${FLAG(g.teams[ab].c)}"></td><td class="ab">${ab}</td><td class="pt">${pts}</td><td class="gd ${gdClass(gd)}">${gd}</td></tr>`;
    });
    const played = ms.filter(m => m.st === "played").length;
    return `<div class="group"><div class="gtitle">${g.name}</div>
      <div class="gsub">${played} of 6 played</div>
      <div class="stage">
        <svg class="lines" width="290" height="290" viewBox="0 0 290 290">${lines}</svg>
        ${nodes}
        <div class="center"><table>${rows}</table></div>
        ${chips}
      </div></div>`;
  }

  /* ============ Ladder view (ranked stack + bracket lines) ============ */
  // Teams stacked top→bottom by standing. Centre spine links adjacent pairs;
  // side brackets carry the three "skip" pairings (T1–T3, T1–T4 on the left, T2–T4 on the right).
  const LY = [40, 120, 200, 280];          // row centres (y)
  function renderGroupLadder(g) {
    const ms = MATCHES.filter(m => m.stage === "group" && m.grp === g.id);
    const findM = (x, y) => ms.find(m => (m.h===x && m.a===y) || (m.h===y && m.a===x));
    const score = (m, top) => {              // show top-ranked team's goals first
      if (m.st !== "played") return "vs";
      const p = m.s.split("–");
      return (p.length === 2 && m.h !== top) ? p[1] + "–" + p[0] : m.s;
    };
    const T = g.standings.map(s => s[0]);
    const conns = [
      { p:[T[0],T[1]], top:T[0], d:"M145 57 L145 103",                    cx:145, cy:80  },
      { p:[T[1],T[2]], top:T[1], d:"M145 137 L145 183",                   cx:145, cy:160 },
      { p:[T[2],T[3]], top:T[2], d:"M145 217 L145 263",                   cx:145, cy:240 },
      { p:[T[0],T[2]], top:T[0], d:"M72 44 L64 44 L64 200 L72 200",       cx:64,  cy:120 },
      { p:[T[0],T[3]], top:T[0], d:"M72 36 L38 36 L38 284 L72 284",       cx:38,  cy:160 },
      { p:[T[1],T[3]], top:T[1], d:"M218 120 L232 120 L232 284 L218 284", cx:232, cy:200 }
    ];
    let lines = "", chips = "";
    conns.forEach(c => {
      const m = findM(c.p[0], c.p[1]); if (!m) return;
      const played = m.st === "played";
      lines += `<path d="${c.d}" fill="none" stroke="${played?'#d4af37':'#4a5876'}" stroke-width="${played?3:2}" ${played?'':'stroke-dasharray="5 5"'} stroke-linecap="round" stroke-linejoin="round"/>`;
      chips += `<div class="chip ${m.st==='upcoming'?'upc':''}" style="left:${c.cx}px;top:${c.cy}px;" data-no="${m.no}"
        data-home="${g.teams[m.h].n}" data-away="${g.teams[m.a].n}" data-score="${m.s==='vs'?'Upcoming':m.s}" data-status="${m.st}"
        data-date="${dateLabel(m.d)}" data-t="${m.t}" data-tz="${m.tz}" data-host="${m.host}" data-venue="${m.v}">${score(m, c.top)}</div>`;
    });
    let teams = "";
    g.standings.forEach(([ab,pts,gd], i) => {
      const tm = g.teams[ab];
      teams += `<div class="lteam" style="top:${LY[i]}px">
        <img src="${FLAG(tm.c)}" alt="${ab}"><span class="lab">${ab}</span>
        <span class="lstat"><span class="lpts">${pts}</span><span class="lbar">|</span><span class="lgd ${gdClass(gd)}">${gd}</span></span>
      </div>`;
    });
    const played = ms.filter(m => m.st === "played").length;
    return `<div class="group"><div class="gtitle">${g.name}</div>
      <div class="gsub">${played} of 6 played</div>
      <div class="ladder">
        <svg class="lines" width="290" height="320" viewBox="0 0 290 320">${lines}</svg>
        ${teams}${chips}
      </div></div>`;
  }

  /* ============ Fixtures tab ============ */
  const WDF = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  const MOF = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  const fullDateLabel = iso => { const dt = new Date(iso + "T12:00:00"); return WDF[dt.getDay()] + ", " + MOF[dt.getMonth()] + " " + dt.getDate(); };

  function watParts(t24, tz) {
    const [H,M] = t24.split(":").map(Number);
    const local = H*60 + M;
    let wat = local - tz*60 + 60, day = 0;
    while (wat >= 1440) { wat -= 1440; day++; }
    while (wat < 0)     { wat += 1440; day--; }
    return { local, wat, day };
  }

  function fxCard(m) {
    const { local, wat, day } = watParts(m.t, m.tz);
    const isGroup = m.stage === "group";
    const tag = isGroup ? "Group " + m.grp : ROUND_LABEL[m.stage];
    let homeHtml, awayHtml, score, dh, da;
    if (isGroup) {
      const home = TEAM[m.h], away = TEAM[m.a];
      homeHtml = `<span class="fx-team home"><span class="nm">${home.n}</span><img src="${FLAG(home.c)}"></span>`;
      awayHtml = `<span class="fx-team away"><img src="${FLAG(away.c)}"><span class="nm">${away.n}</span></span>`;
      score = m.st === "played" ? m.s : "vs"; dh = home.n; da = away.n;
    } else {
      const i1 = slotInfo(m.s1), i2 = slotInfo(m.s2);
      const n1 = slotName(m.s1, true), n2 = slotName(m.s2, true);
      const f1 = i1.kind === "team" ? `<img src="${FLAG(TEAM[i1.abbr].c)}">` : "";
      const f2 = i2.kind === "team" ? `<img src="${FLAG(TEAM[i2.abbr].c)}">` : "";
      homeHtml = `<span class="fx-team home ${i1.kind!=='team'?'ko':''}"><span class="nm">${n1}</span>${f1}</span>`;
      awayHtml = `<span class="fx-team away ${i2.kind!=='team'?'ko':''}">${f2}<span class="nm">${n2}</span></span>`;
      score = m.st === "played" ? m.s : "vs"; dh = n1; da = n2;
    }
    return `<div class="fx-card ${m.st}" id="m${m.no}" data-no="${m.no}"
      data-home="${dh}" data-away="${da}" data-score="${m.st==='played'?m.s:'Upcoming'}" data-status="${m.st}"
      data-date="${dateLabel(m.d)}" data-t="${m.t}" data-tz="${m.tz}" data-host="${m.host}" data-venue="${m.v}">
      <div class="fx-time"><div class="fx-no">Match ${m.no}</div>${fmt12(local)}<div class="wat">${fmt12(wat)}${day>0?" +"+day:""} WAT</div></div>
      <div class="fx-match">${homeHtml}<span class="fx-score">${score}</span>${awayHtml}</div>
      <div class="fx-venue"><span class="fx-tag">${tag}</span><img src="${FLAG(m.host)}"><span>${m.v}</span></div>
    </div>`;
  }

  const FX_STAGEDEF = [
    { k:"MD1", label:"Matchday 1",          c:"#4f9dde", max:24 },
    { k:"MD2", label:"Matchday 2",          c:"#46c08a", max:48 },
    { k:"MD3", label:"Matchday 3",          c:"#b57edc", max:72 },
    { k:"R32", label:"Round of 32",         c:"#e09b4a", max:88 },
    { k:"R16", label:"Round of 16",         c:"#df6b6b", max:96 },
    { k:"QF",  label:"Quarter-finals",      c:"#4cc4c4", max:100 },
    { k:"SFF", label:"Semi-finals & Final", c:"#d4af37", max:104 }
  ];
  const FX_PILLS = [["MD1","MD1"],["MD2","MD2"],["MD3","MD3"],["R32","R32"],["R16","R16"],["QF","QF"],["SF + Final","SFF"]];
  const stageOf = no => FX_STAGEDEF.find(s => no <= s.max);
  const hexA = (hex,a) => { const n = parseInt(hex.slice(1),16); return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`; };
  function renderFixtures() {
    let jump = `<div class="fx-jump"><span class="fx-jl">Jump to</span><button class="fx-pill" data-today="1">Today</button>`;
    FX_PILLS.forEach(([lbl,k]) => jump += `<button class="fx-pill" data-stage="${k}">${lbl}</button>`);
    jump += `</div>`;
    const sorted = [...MATCHES].sort((a,b) => a.d.localeCompare(b.d) || a.t.localeCompare(b.t));
    let html = "", curStage = "", curDate = "";
    sorted.forEach(m => {
      const st = stageOf(m.no);
      if (st.k !== curStage) {
        curStage = st.k; curDate = "";
        html += `<div class="fx-stage" id="s-${st.k}" style="background:${hexA(st.c,0.12)};border-left-color:${st.c};color:${st.c};">${st.label}</div>`;
      }
      if (m.d !== curDate) { curDate = m.d; html += `<div class="fx-day">${fullDateLabel(m.d)}</div>`; }
      html += fxCard(m);
    });
    document.getElementById("panel-fixtures").innerHTML = `<div class="fixtures">${jump}${html}</div>`;
  }
  renderFixtures();

  /* ============ Knockout bracket (two-sided, final in centre) ============ */
  const ROUND_SHORT = { R32:"R32", R16:"R16", QF:"QF", SF:"SF", FINAL:"Final", "3RD":"3rd" };
  // column per match: 0-3 = left half, 4 = centre (final + 3rd place), 5-8 = right half (mirrored)
  const KO_COL = {};
  const koPlace = (c, arr) => arr.forEach(no => KO_COL[no] = c);
  koPlace(0,[74,77,73,75,83,84,81,82]); koPlace(1,[89,90,93,94]); koPlace(2,[97,98]); koPlace(3,[101]);
  koPlace(4,[104,103]); koPlace(5,[102]); koPlace(6,[99,100]); koPlace(7,[91,92,95,96]);
  koPlace(8,[76,78,79,80,86,88,85,87]);
  const KO_HEADS = ["Round of 32","Round of 16","Quarter-finals","Semi-finals","Final","Semi-finals","Quarter-finals","Round of 16","Round of 32"];
  const koFeeders = m => [m.s1, m.s2].map(s => { const mm = s.match(/Match (\d+)/); return mm ? +mm[1] : null; });

  // shared inner HTML of a match box (meta line + two resolved slots), used by bracket and mobile list
  function koBoxInner(m) {
    const res = koResult(m), sc = koScoreParts(m);
    const slot = (s, gi) => {
      const info = slotInfo(s);
      const flag = info.kind === "team" ? `<img class="ko-flag" src="${FLAG(TEAM[info.abbr].c)}" alt="">` : "";
      const label = info.kind === "team" ? info.abbr : (info.kind === "pair" ? info.a + "/" + info.b : info.text);
      const win = res && info.kind === "team" && info.abbr === res.win;
      let pen = "";
      if (m.st === "played" && m.pen && res && info.kind === "team") {
        const pp = m.pen.split("–");
        if (pp.length === 2) pen = `<span class="ko-pen">(${info.abbr === res.win ? pp[0] : pp[1]})</span>`;
      }
      const gf = (m.st === "played" && sc) ? `<span class="ko-gf">${pen}${sc[gi]}</span>` : "";
      return `<div class="ko-slot ${win ? "win" : ""} ${info.kind !== "team" ? "tbd" : ""}"><span class="ko-name">${flag}<span class="ko-ab">${label}</span></span>${gf}</div>`;
    };
    return `<div class="ko-meta"><span>M${m.no} · ${ROUND_SHORT[m.stage]}</span><span>${shortMD(m.d)}</span></div>${slot(m.s1,0)}${slot(m.s2,1)}`;
  }
  // shared data-* attributes for hover tooltip + click-to-open-modal binding
  const koData = m => { const _r = koResult(m);
    return `data-no="${m.no}" data-home="${slotName(m.s1,true)}" data-away="${slotName(m.s2,true)}" `
    + `data-homeflag="${slotFlag(m.s1)}" data-awayflag="${slotFlag(m.s2)}" data-status="${m.st}" data-score="${m.st==='played'?m.s:'Upcoming'}" `
    + `data-pen="${m.pen||''}" data-penwin="${m.pen&&_r?TEAM[_r.win].n:''}" `
    + `data-date="${dateLabel(m.d)}" data-t="${m.t}" data-tz="${m.tz}" data-host="${m.host}" data-venue="${m.v}"`; };

  function renderKnockout() {
    const KO = MATCHES.filter(m => m.stage !== "group");
    const boxW = 104, boxH = 54, step = 120, rowH = 62, topPad = 44, pad = 14;
    const xOf = c => pad + c*step;
    const y = {};
    const L32 = [74,77,73,75,83,84,81,82], R32 = [76,78,79,80,86,88,85,87];
    L32.forEach((no,i) => y[no] = topPad + i*rowH + boxH/2);
    R32.forEach((no,i) => y[no] = topPad + i*rowH + boxH/2);
    [[1,7],[2,6],[3,5]].forEach(pair => pair.forEach(c =>
      KO.filter(m => KO_COL[m.no] === c).forEach(m => { const [f1,f2] = koFeeders(m); y[m.no] = (y[f1]+y[f2])/2; })));
    y[104] = (y[101] + y[102]) / 2;
    y[103] = y[104] + rowH * 1.55;
    const W = xOf(8) + boxW + pad, H = topPad + 8*rowH + 90;

    const GREY = "#3a4a6a", GOLD = "#d4af37";
    const seg = (d, on) => `<path d="${d}" stroke="${on ? GOLD : GREY}" stroke-width="${on ? 2.5 : 1.5}" fill="none" stroke-linecap="round"/>`;
    let lines = "";
    KO.filter(m => /Match/.test(m.s1)).forEach(m => {
      const bx = xOf(KO_COL[m.no]), by = y[m.no];
      koFeeders(m).forEach(f => {
        if (!f) return;
        const fx0 = xOf(KO_COL[f]), fxOut = fx0 < bx ? fx0 + boxW : fx0, bxIn = fx0 < bx ? bx : bx + boxW, mid = (fxOut + bxIn) / 2;
        lines += seg(`M${fxOut} ${y[f]} H${mid} V${by} H${bxIn}`, MByNo[f] && MByNo[f].st === "played");
      });
    });

    let heads = "";
    KO_HEADS.forEach((h,c) => heads += `<div class="ko-col-head" style="left:${xOf(c)}px;width:${boxW}px;">${h}</div>`);

    let boxes = "";
    KO.forEach(m => {
      boxes += `<div class="ko-box ${m.stage==='FINAL'?'ko-final':''} ${m.stage==='3RD'?'ko-third':''} ${m.st==='played'?'played':''}"
        style="left:${xOf(KO_COL[m.no])}px;top:${y[m.no]-boxH/2}px;width:${boxW}px;height:${boxH}px;" ${koData(m)}>${koBoxInner(m)}</div>`;
    });

    // mobile fallback: round-by-round stacked list (shown under a media query)
    const STAGES = [["R32","Round of 32"],["R16","Round of 16"],["QF","Quarter-finals"],["SF","Semi-finals"],["FINAL","Final"],["3RD","Third place"]];
    let list = "";
    STAGES.forEach(([stg,label]) => {
      const ms = KO.filter(m => m.stage === stg).sort((a,b) => a.no - b.no);
      if (!ms.length) return;
      list += `<div class="kl-round"><div class="kl-rh">${label}</div>`
        + ms.map(m => `<div class="kl-card ${m.st==='played'?'played':''}" ${koData(m)}>${koBoxInner(m)}</div>`).join("") + `</div>`;
    });

    document.getElementById("panel-knockout").innerHTML =
      `<p class="hint">Tap or hover any match for details · winners advance automatically as results come in</p>
       <div class="ko-desktop"><div class="bracket-wrap"><div class="bracket" style="width:${W}px;height:${H}px;">
         <svg class="ko-lines" width="${W}" height="${H}">${lines}</svg>${heads}${boxes}
       </div></div></div>
       <div class="ko-mobile">${list}</div>`;
  }
  renderKnockout();

  /* ============ tabs ============ */
  document.querySelectorAll(".tab").forEach(t => {
    t.addEventListener("click", () => {
      document.querySelectorAll(".tab").forEach(x => x.classList.toggle("active", x === t));
      const id = t.dataset.tab;
      document.querySelectorAll(".panel").forEach(p => p.classList.toggle("active", p.id === "panel-" + id));
    });
  });

  /* ============ hover tooltip ============ */
  const tip = document.getElementById("tip");
  const elTeams=document.getElementById("tipTeams"), elScore=document.getElementById("tipScore"),
        elDate=document.getElementById("tipDate"), elTime=document.getElementById("tipTime"),
        elVenue=document.getElementById("tipVenue"), elHost=document.getElementById("tipHostFlag");

  function showTip(e) {
    const chip = e.currentTarget, d = chip.dataset, upc = d.status !== "played";
    const fl = u => u ? `<img class="t-flag" src="${u}" alt="">` : "";
    elTeams.innerHTML = `${fl(d.homeflag)}<span class="nm">${d.home}</span> <span class="nm">–</span> ${fl(d.awayflag)}<span class="nm">${d.away}</span>`;
    elScore.innerHTML = upc ? "Upcoming" : (d.pen ? `${d.score} <span class="t-pen">${d.penwin} win ${d.pen} pens</span>` : d.score);
    elDate.textContent = d.date;
    elTime.textContent = timeStr(d.t, Number(d.tz));
    elVenue.textContent = d.venue;
    elHost.src = FLAG(d.host);
    tip.classList.toggle("upc", upc);
    tip.classList.add("show");
    const r = chip.getBoundingClientRect(), tw = 250, th = tip.offsetHeight || 120;
    let left = r.left + r.width/2 - tw/2;
    left = Math.max(6, Math.min(left, window.innerWidth - tw - 6));
    let top = r.top - th - 10;
    if (top < 6) top = r.bottom + 10;
    tip.style.left = left + "px";
    tip.style.top = top + "px";
  }
  const hideTip = () => tip.classList.remove("show");
  // bind hover + click to a match element (hover tooltips only where wanted)
  function bindMatchEl(el, hover) {
    if (hover) { el.addEventListener("mouseenter", showTip); el.addEventListener("mouseleave", hideTip); }
    el.addEventListener("click", () => openMatch(+el.dataset.no));
  }
  document.querySelectorAll(".ko-box").forEach(el => bindMatchEl(el, true));
  document.querySelectorAll(".kl-card").forEach(el => bindMatchEl(el, false));
  document.querySelectorAll(".fx-card").forEach(el => bindMatchEl(el, false));

  /* ============ match summary modal ============ */
  const modalBg = document.getElementById("modalBg");
  function goalsCol(det, abbr) {
    return det.g.filter(x => x.t === abbr).map(x => {
      const tag = x.type === "pen" ? ' <span class="tag">(pen)</span>' : x.type === "og" ? ' <span class="tag">(OG)</span>' : "";
      return `<div class="m-goal">${x.p} <span class="min">${x.m}'</span>${tag}</div>`;
    }).join("");
  }
  function openMatch(no) {
    const m = MByNo[no]; if (!m) return;
    tip.classList.remove("show");
    const isGroup = m.stage === "group";
    const { local, wat, day } = watParts(m.t, m.tz);
    const timeLine = `${fmt12(local)} (local) &nbsp;|&nbsp; ${fmt12(wat)}${day>0?" +"+day:""} (WAT)`;
    let homeName, awayName, homeImg = "", awayImg = "", scoreHtml, homeAbbr = null, awayAbbr = null, hWin = false, aWin = false;
    if (isGroup) {
      const h = TEAM[m.h], a = TEAM[m.a];
      homeName = h.n; awayName = a.n; homeAbbr = m.h; awayAbbr = m.a;
      homeImg = `<img src="${FLAG(h.c)}">`; awayImg = `<img src="${FLAG(a.c)}">`;
      scoreHtml = m.st === "played" ? `<span class="m-score">${m.s}</span>` : `<span class="m-score upc">vs</span>`;
    } else {
      const i1 = slotInfo(m.s1), i2 = slotInfo(m.s2), res = koResult(m);
      homeName = slotName(m.s1, true); awayName = slotName(m.s2, true);
      if (i1.kind === "team") { homeAbbr = i1.abbr; homeImg = `<img src="${FLAG(TEAM[i1.abbr].c)}">`; }
      if (i2.kind === "team") { awayAbbr = i2.abbr; awayImg = `<img src="${FLAG(TEAM[i2.abbr].c)}">`; }
      hWin = !!(res && homeAbbr && res.win === homeAbbr);
      aWin = !!(res && awayAbbr && res.win === awayAbbr);
      const penTxt = (m.pen && res) ? `<span class="m-pen">${TEAM[res.win].n} win ${m.pen} on penalties</span>` : "";
      scoreHtml = m.st === "played" ? `<span class="m-score">${m.s}${penTxt}</span>` : `<span class="m-score upc">vs</span>`;
    }
    const det = MATCHDETAIL[no];
    let body = "";
    if (m.st === "played" && det) {
      if (det.g.length) body += `<div class="m-sec"><div class="m-sec-h">⚽ Goals</div><div class="m-goals"><div class="col home">${goalsCol(det,homeAbbr)}</div><div class="col away">${goalsCol(det,awayAbbr)}</div></div></div>`;
      if (det.r.length) body += `<div class="m-sec"><div class="m-sec-h">🟥 Red cards</div>` + det.r.map(x => `<div class="m-goal">${x.p} <span class="min">${x.m}'</span> <span class="tag">${x.t}</span></div>`).join("") + `</div>`;
      if (det.s) body += `<div class="m-sec"><div class="m-sec-h">Summary</div><div class="m-summary">${det.s}</div></div>`;
      const q = encodeURIComponent(`${homeName} vs ${awayName} 2026 World Cup highlights`);
      body += `<a class="m-watch" href="https://www.youtube.com/results?search_query=${q}" target="_blank" rel="noopener">▶ Watch highlights</a>`;
    } else {
      body = `<div class="m-note">This match hasn't been played yet.</div>`;
    }
    document.getElementById("modalContent").innerHTML = `
      <button class="modal-close" aria-label="Close">×</button>
      <div class="modal-head">
        <div class="m-teams">
          <span class="m-team h ${hWin?'win':''}">${homeName} ${homeImg}</span>
          ${scoreHtml}
          <span class="m-team a ${aWin?'win':''}">${awayImg} ${awayName}</span>
        </div>
        <div class="m-meta">M${m.no} · ${isGroup ? ("Group " + m.grp) : ROUND_LABEL[m.stage]} · ${dateLabel(m.d)}<br>${timeLine}<br><img class="hostflag" src="${FLAG(m.host)}">${m.v}</div>
      </div>
      <div class="modal-body">${body}</div>`;
    modalBg.classList.add("show");
  }
  modalBg.addEventListener("click", e => { if (e.target === modalBg || e.target.classList.contains("modal-close")) modalBg.classList.remove("show"); });
  document.addEventListener("keydown", e => { if (e.key === "Escape") modalBg.classList.remove("show"); });

  // ===== Group-stage view toggle (orbit ↔ ladder) =====
  function paintGroups(view) {
    const fn = view === "ladder" ? renderGroupLadder : renderGroup;
    document.getElementById("groups").innerHTML = GROUPS.map(fn).join("");
    document.querySelectorAll("#groups .chip").forEach(el => bindMatchEl(el, true));
  }
  let groupView = "orbit";
  try { groupView = localStorage.getItem("wc-group-view") || "orbit"; } catch (e) {}
  document.querySelectorAll(".gs-pill").forEach(p => {
    p.classList.toggle("active", p.dataset.view === groupView);
    p.addEventListener("click", () => {
      groupView = p.dataset.view;
      document.querySelectorAll(".gs-pill").forEach(x => x.classList.toggle("active", x === p));
      try { localStorage.setItem("wc-group-view", groupView); } catch (e) {}
      paintGroups(groupView);
    });
  });
  paintGroups(groupView);

  // fixtures jump-to navigation
  document.querySelectorAll(".fx-pill").forEach(p => p.addEventListener("click", () => {
    let el;
    if (p.dataset.today) {
      const iso = new Date().toISOString().slice(0,10);
      const sorted = [...MATCHES].sort((a,b) => a.d.localeCompare(b.d) || a.t.localeCompare(b.t));
      const no = (sorted.find(m => m.d >= iso) || sorted[sorted.length-1]).no;
      el = document.getElementById("m" + no);
    } else {
      el = document.getElementById("s-" + p.dataset.stage);
    }
    if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
  }));

  // back-to-top (timer-based smooth scroll — reliable even where native smooth scroll is disabled)
  document.getElementById("toTop").addEventListener("click", () => {
    const id = setInterval(() => {
      const y = window.scrollY;
      if (y > 1) window.scrollTo(0, Math.max(0, y - Math.max(40, y * 0.2)));
      else { window.scrollTo(0, 0); clearInterval(id); }
    }, 16);
  });
</script>
</body>
</html>
