<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 World Cup — Visual Guide</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-weight: 400 !important; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #0e1117; color: #e8edf4; padding: 22px 12px 50px;
    -webkit-font-smoothing: antialiased;
  }
  .page { max-width: 1340px; margin: 0 auto; }
  h1 { text-align: center; font-size: 23px; letter-spacing: .5px; margin-bottom: 3px; }
  .subtitle { text-align: center; color: #93a1b5; font-size: 13px; margin-bottom: 14px; }

  /* tabs */
  .tabs { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .tab {
    background: #1a2231; color: #aeb9c9; border: 1px solid #2c3850;
    padding: 9px 22px; border-radius: 999px; font-size: 13.5px; cursor: pointer;
    transition: all .15s ease;
  }
  .tab:hover { border-color: #44557a; color: #d7deea; }
  .tab.active { background: #d4af37; color: #1a1407; border-color: #d4af37; }
  .panel { display: none; } .panel.active { display: block; }
  .placeholder { text-align: center; color: #6b7891; padding: 70px 20px; font-size: 14px; }
  .placeholder strong { color: #93a1b5; font-weight: 800; }

  .hint { text-align: center; color: #6b7891; font-size: 12px; margin-bottom: 6px; }
  .legend { display: flex; justify-content: center; gap: 18px; margin-bottom: 18px; font-size: 11.5px; color: #93a1b5; }
  .legend span { display: inline-flex; align-items: center; gap: 6px; }
  .swatch { width: 20px; height: 4px; border-radius: 2px; display: inline-block; }
  .swatch.gold { background: #d4af37; } .swatch.grey { background: #4a5876; }

  .groups { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  @media (max-width: 1100px) { .groups { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 560px)  { .groups { grid-template-columns: 1fr; } }

  .group {
    background: #151c28; border: 1px solid #232e42; border-radius: 14px;
    padding: 12px 6px 14px;
  }
  .group .gtitle { text-align: center; font-size: 13px; font-weight: 800; letter-spacing: 1px; color: #d4af37; margin-bottom: 1px; }
  .group .gsub { text-align: center; font-size: 9.5px; letter-spacing: .3px; color: #6b7891; margin-bottom: 5px; }

  .stage { position: relative; width: 290px; max-width: 100%; height: 290px; margin: 0 auto; }
  svg.lines { position: absolute; top: 0; left: 0; overflow: visible; }

  .node {
    position: absolute; width: 54px; height: 54px; border-radius: 50%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: #1a2330; border: 2px solid #3a4a6a; z-index: 3; text-align: center;
  }
  .node img { width: 30px; height: 20px; object-fit: cover; border-radius: 3px; box-shadow: 0 1px 3px rgba(0,0,0,.5); }
  .node .ab { font-size: 9px; font-weight: 800; letter-spacing: .5px; margin-top: 2px; color: #cfd8e6; }

  .chip {
    position: absolute; z-index: 5; transform: translate(-50%, -50%);
    background: #d4af37; color: #1a1407; font-weight: 800; font-size: 11px;
    padding: 3px 7px; border-radius: 7px; white-space: nowrap; cursor: pointer;
    box-shadow: 0 2px 6px rgba(0,0,0,.45); transition: transform .12s ease, box-shadow .12s ease;
  }
  .chip:hover { transform: translate(-50%, -50%) scale(1.15); box-shadow: 0 3px 12px rgba(212,175,55,.55); }
  .chip.upc { background: #2c3850; color: #aeb9c9; }
  .chip.upc:hover { box-shadow: 0 3px 12px rgba(74,88,118,.6); }

  .center {
    position: absolute; width: 110px; height: 110px; left: 90px; top: 90px; border-radius: 50%;
    background: #0c1320; border: 2px solid #d4af37; z-index: 3;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    box-shadow: 0 0 22px rgba(212,175,55,.22);
  }
  .center table { border-collapse: collapse; }
  .center td { font-size: 9.5px; padding: 1px 2px; line-height: 1.25; }
  .center td.fl { width: 16px; } .center td.fl img { width: 14px; height: 10px; object-fit: cover; border-radius: 1.5px; display: block; }
  .center td.ab { font-weight: 800; color: #e8edf4; text-align: left; padding-right: 4px; }
  .center td.pt { color: #d4af37; font-weight: 800; text-align: right; }
  .center td.gd { font-weight: 700; text-align: right; width: 22px; }
  .center td.gd.pos { color: #5fcf97; } .center td.gd.neg { color: #e0746a; } .center td.gd.zero { color: #8a97ab; }

  /* ===== Ladder view (ranked stack + bracket lines) ===== */
  .ladder { position: relative; width: 290px; max-width: 100%; height: 320px; margin: 2px auto 0; }
  .ladder svg.lines { position: absolute; top: 0; left: 0; overflow: visible; }
  .lteam { position: absolute; left: 50%; transform: translate(-50%, -50%); width: 146px; height: 34px;
    display: flex; align-items: center; gap: 8px; padding: 0 10px; z-index: 3;
    background: #1a2330; border: 1.5px solid #3a4a6a; border-radius: 9px; }
  .lteam img { width: 24px; height: 16px; object-fit: cover; border-radius: 2px; box-shadow: 0 1px 2px rgba(0,0,0,.5); flex: none; }
  .lteam .lab { font-size: 13px; font-weight: 800; letter-spacing: .5px; color: #e8edf4; }
  .lteam .lstat { margin-left: auto; font-size: 11px; display: flex; align-items: center; gap: 5px; }
  .lteam .lpts { color: #d4af37; font-weight: 800; }
  .lteam .lbar { color: #44557a; }
  .lteam .lgd.pos { color: #5fcf97; } .lteam .lgd.neg { color: #e0746a; } .lteam .lgd.zero { color: #8a97ab; }

  /* ===== Group-stage view toggle ===== */
  .gs-toggle { display: flex; justify-content: center; align-items: center; gap: 8px; margin-bottom: 16px; }
  .gs-label { font-size: 11px; color: #6b7891; margin-right: 2px; }
  .gs-pill { background: #1a2231; color: #aeb9c9; border: 1px solid #2c3850; padding: 6px 18px;
    border-radius: 999px; font-size: 12.5px; cursor: pointer; transition: all .12s ease; }
  .gs-pill:hover { border-color: #44557a; color: #d7deea; }
  .gs-pill.active { background: #d4af37; color: #1a1407; border-color: #d4af37; }

  /* ===== Fixtures ===== */
  .fixtures { max-width: 1000px; margin: 0 auto; }
  .fx-day { margin: 20px 0 9px; padding-bottom: 5px; font-size: 13.5px; font-weight: 800; color: #d4af37;
    letter-spacing: .4px; border-bottom: 1px solid #232e42; }
  .fx-day:first-child { margin-top: 2px; }
  .fx-card { display: grid; grid-template-columns: 116px 1fr 268px; align-items: center; gap: 14px;
    background: #151c28; border: 1px solid #232e42; border-left-width: 3px; border-radius: 10px;
    padding: 11px 16px; margin-bottom: 8px; cursor: pointer; transition: background .12s, border-color .12s; }
  .fx-card:hover { background: #1a2230; border-color: #3a4a6a; }
  .fx-card.played { border-left-color: #d4af37; }
  .fx-card.upcoming { border-left-color: #4a5876; }
  .fx-time { font-size: 12px; color: #c4cedd; line-height: 1.3; }
  .fx-time .wat { font-size: 10px; color: #7d8aa0; }
  .fx-match { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 12px; }
  .fx-team { display: flex; align-items: center; gap: 8px; font-size: 13.5px; color: #e8edf4; }
  .fx-team.home { justify-content: flex-end; text-align: right; }
  .fx-team.away { justify-content: flex-start; }
  .fx-team img { width: 26px; height: 18px; object-fit: cover; border-radius: 3px; box-shadow: 0 1px 2px rgba(0,0,0,.5); flex: none; }
  .fx-score { font-size: 16px; font-weight: 800; color: #d4af37; min-width: 56px; text-align: center; }
  .fx-card.upcoming .fx-score { color: #7d8aa0; font-size: 12.5px; font-weight: 700; }
  .fx-venue { font-size: 11px; color: #8a97ab; display: flex; align-items: center; justify-content: flex-end; gap: 7px; text-align: right; }
  .fx-venue img { width: 15px; height: 11px; object-fit: cover; border-radius: 2px; flex: none; }
  .fx-tag { background: #222c3f; color: #aeb9c9; font-size: 9.5px; padding: 2px 7px; border-radius: 5px; white-space: nowrap; flex: none; }
  .fx-no { font-size: 9.5px; color: #d4af37; font-weight: 800; margin-bottom: 1px; }
  .fx-team.ko .nm { color: #9aa7bd; font-size: 12.5px; }
  @media (max-width: 680px) {
    .fx-card { grid-template-columns: 1fr; gap: 9px; text-align: center; }
    .fx-venue { justify-content: center; }
    .fx-time { display: flex; gap: 8px; justify-content: center; align-items: baseline; }
  }

  /* ===== Fixtures jump bar ===== */
  .fx-jump { position: sticky; top: 0; z-index: 10; display: flex; flex-wrap: wrap; gap: 6px; align-items: center;
    background: #0e1117; padding: 9px 0 10px; margin-bottom: 6px; border-bottom: 1px solid #1c2433; }
  .fx-jl { font-size: 11px; color: #6b7891; margin-right: 4px; }
  .fx-pill { background: #1a2231; color: #aeb9c9; border: 1px solid #2c3850; padding: 5px 13px; border-radius: 999px;
    font-size: 12px; cursor: pointer; transition: all .12s ease; }
  .fx-pill:hover { background: #d4af37; color: #1a1407; border-color: #d4af37; }
  .fx-card, .fx-day, .fx-stage { scroll-margin-top: 54px; }
  .fx-stage { display: flex; align-items: center; margin: 26px 0 8px; padding: 10px 15px;
    border-radius: 10px; border-left: 4px solid; font-size: 14px; letter-spacing: .5px; }
  .fx-stage:first-of-type { margin-top: 2px; }

  /* ===== Match summary modal ===== */
  .modal-bg { position: fixed; inset: 0; background: rgba(6,9,14,.74); z-index: 100; display: none;
    align-items: flex-start; justify-content: center; padding: 42px 16px; overflow: auto; }
  .modal-bg.show { display: flex; }
  .modal { background: #141b27; border: 1px solid #2c3850; border-radius: 16px; width: 470px; max-width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,.6); position: relative; }
  .modal-close { position: absolute; top: 10px; right: 13px; cursor: pointer; color: #7d8aa0; font-size: 22px;
    line-height: 1; background: none; border: none; z-index: 2; }
  .modal-close:hover { color: #e8edf4; }
  .modal-head { padding: 20px 20px 16px; border-bottom: 1px solid #232e42; }
  .m-teams { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 12px; }
  .m-team { display: flex; align-items: center; gap: 9px; font-size: 15px; color: #e8edf4; }
  .m-team.h { justify-content: flex-end; text-align: right; }
  .m-team img { width: 30px; height: 20px; object-fit: cover; border-radius: 3px; box-shadow: 0 1px 3px rgba(0,0,0,.5); flex: none; }
  .m-score { font-size: 22px; font-weight: 800; color: #d4af37; white-space: nowrap; }
  .m-score.upc { font-size: 13px; color: #7d8aa0; font-weight: 700; }
  .m-meta { text-align: center; color: #9aa7bd; font-size: 11.5px; margin-top: 11px; line-height: 1.65; }
  .m-meta .hostflag { display: inline-block; vertical-align: middle; width: 15px; height: 11px; object-fit: cover; border-radius: 2px; margin-right: 5px; }
  .modal-body { padding: 16px 20px 20px; }
  .m-sec { margin-bottom: 15px; }
  .m-sec:last-child { margin-bottom: 0; }
  .m-sec-h { font-size: 12px; color: #93a1b5; font-weight: 800; margin-bottom: 8px; }
  .m-goals { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .m-goals .col.away { text-align: right; }
  .m-goal { font-size: 12.5px; color: #dfe6f0; line-height: 1.75; }
  .m-goal .min { color: #8a97ab; }
  .m-goal .tag { color: #d4af37; font-size: 10px; margin-left: 2px; }
  .m-summary { font-size: 12.5px; color: #c4cedd; line-height: 1.65; }
  .m-watch { display: inline-block; margin-top: 4px; background: #d4af37; color: #1a1407; font-weight: 800;
    font-size: 12px; padding: 8px 15px; border-radius: 8px; text-decoration: none; }
  .m-watch:hover { background: #e6c34a; }
  .m-note { color: #7d8aa0; font-size: 13px; text-align: center; padding: 14px 0 4px; }

  /* ===== back-to-top button ===== */
  #toTop { position: fixed; bottom: 24px; right: 24px; z-index: 60; width: 46px; height: 46px;
    border-radius: 50%; background: #d4af37; color: #1a1407; border: none; cursor: pointer;
    font-size: 22px; line-height: 1; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 14px rgba(0,0,0,.5); opacity: .85; transition: opacity .15s, transform .15s; }
  #toTop:hover { opacity: 1; transform: translateY(-2px); }

  /* ===== Knockout bracket ===== */
  .bracket-wrap { overflow: auto; max-height: 78vh; border: 1px solid #232e42; border-radius: 12px; background: #10151e; }
  .bracket { position: relative; }
  .ko-col-head { position: absolute; top: 16px; font-size: 11px; color: #9aa7bd; font-weight: 800; letter-spacing: .5px; text-align: center; }
  .ko-box {
    position: absolute; background: #151c28; border: 1px solid #2c3850; border-radius: 8px;
    padding: 5px 8px; cursor: pointer; z-index: 2; overflow: hidden;
    transition: border-color .12s, background .12s;
  }
  .ko-box:hover { border-color: #d4af37; background: #1a2230; }
  .ko-box.ko-final { border-color: #d4af37; box-shadow: 0 0 16px rgba(212,175,55,.22); }
  .ko-box.ko-third { border-style: dashed; }
  .ko-meta { font-size: 8.5px; color: #6b7891; display: flex; justify-content: space-between; margin-bottom: 3px; }
  .ko-slot { font-size: 11px; color: #cfd8e6; line-height: 1.55; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  svg.ko-lines { position: absolute; top: 0; left: 0; z-index: 1; }

  #tip {
    position: fixed; z-index: 50; pointer-events: none; opacity: 0; transition: opacity .12s ease;
    width: 250px; background: #1b2536; border: 1px solid #34425e; border-radius: 11px;
    padding: 11px 12px; box-shadow: 0 10px 30px rgba(0,0,0,.55);
  }
  #tip.show { opacity: 1; }
  #tip .t-head { font-size: 12.5px; font-weight: 800; display: flex; align-items: baseline; gap: 6px;
    padding-bottom: 8px; margin-bottom: 8px; border-bottom: 1px solid #2c3850; }
  #tip .t-score { margin-left: auto; color: #d4af37; font-size: 14px; }
  #tip.upc .t-score { color: #8a97ab; font-size: 11px; font-weight: 700; border: 1px solid #3a4a6a; padding: 1px 6px; border-radius: 5px; }
  #tip .t-row { display: flex; gap: 7px; font-size: 11.5px; color: #c4cedd; margin-top: 5px; align-items: flex-start; line-height: 1.35; }
  #tip .t-row .ic { width: 16px; text-align: center; flex: none; }
  #tip .hostflag { width: 15px; height: 11px; object-fit: cover; border-radius: 2px; display: block; margin-top: 1px; box-shadow: 0 1px 2px rgba(0,0,0,.5); }
</style>
</head>
<body>
<div class="page">
  <h1>2026 World Cup — Visual Guide</h1>
  <p class="subtitle">Group stage · knockout bracket · full schedule</p>

  <div class="tabs">
    <button class="tab active" data-tab="group">Group Stage</button>
    <button class="tab" data-tab="knockout">Knockout Stage</button>
    <button class="tab" data-tab="fixtures">Fixtures</button>
  </div>

  <!-- ===================== GROUP STAGE ===================== -->
  <div class="panel active" id="panel-group">
    <p class="hint">Hover any score for match details · click to open the full summary</p>
    <div class="gs-toggle">
      <span class="gs-label">View</span>
      <button class="gs-pill" data-view="orbit">Orbit</button>
      <button class="gs-pill" data-view="ladder">Ladder</button>
    </div>
    <div class="legend">
      <span><i class="swatch gold"></i> Played</span>
      <span><i class="swatch grey"></i> Upcoming</span>
    </div>
    <div class="groups" id="groups"></div>
  </div>

  <!-- ===================== KNOCKOUT STAGE ===================== -->
  <div class="panel" id="panel-knockout">
    <div class="placeholder"><strong>Knockout Stage bracket</strong><br>Coming next — the linear Round of 32 → Final bracket.</div>
  </div>

  <!-- ===================== FIXTURES ===================== -->
  <div class="panel" id="panel-fixtures">
    <div class="placeholder"><strong>Fixtures</strong><br>Coming next — every match in date order.</div>
  </div>

  <!-- match summary modal -->
  <div class="modal-bg" id="modalBg"><div class="modal" id="modalContent"></div></div>

  <!-- shared hover tooltip -->
  <div id="tip">
    <div class="t-head"><span id="tipTeams"></span><span class="t-score" id="tipScore"></span></div>
    <div class="t-row"><span class="ic">📅</span><span id="tipDate"></span></div>
    <div class="t-row"><span class="ic">🕘</span><span id="tipTime"></span></div>
    <div class="t-row"><span class="ic"><img id="tipHostFlag" class="hostflag" alt=""></span><span id="tipVenue"></span></div>
  </div>

  <button id="toTop" aria-label="Back to top" title="Back to top">↑</button>
</div>

<script>
  const FLAG = code => `https://flagcdn.com/w40/${code}.png`;

  /* ============ GROUP METADATA (teams, layout, standings) ============ */
  const GROUPS = [
    { id:"A", name:"GROUP A", layout:["MEX","CZE","KOR","RSA"],
      teams:{ MEX:{n:"Mexico",c:"mx"}, CZE:{n:"Czechia",c:"cz"}, KOR:{n:"South Korea",c:"kr"}, RSA:{n:"South Africa",c:"za"} },
      standings:[["MEX",6,"+3"],["KOR",3,"0"],["CZE",1,"−1"],["RSA",1,"−2"]] },
    { id:"B", name:"GROUP B", layout:["CAN","BIH","QAT","SUI"],
      teams:{ CAN:{n:"Canada",c:"ca"}, BIH:{n:"Bosnia & Herzegovina",c:"ba"}, QAT:{n:"Qatar",c:"qa"}, SUI:{n:"Switzerland",c:"ch"} },
      standings:[["CAN",4,"+6"],["SUI",4,"+3"],["BIH",1,"−3"],["QAT",1,"−6"]] },
    { id:"C", name:"GROUP C", layout:["BRA","MAR","HAI","SCO"],
      teams:{ BRA:{n:"Brazil",c:"br"}, MAR:{n:"Morocco",c:"ma"}, HAI:{n:"Haiti",c:"ht"}, SCO:{n:"Scotland",c:"gb-sct"} },
      standings:[["BRA",4,"+3"],["MAR",4,"+1"],["SCO",3,"0"],["HAI",0,"−4"]] },
    { id:"D", name:"GROUP D", layout:["USA","PAR","AUS","TUR"],
      teams:{ USA:{n:"United States",c:"us"}, PAR:{n:"Paraguay",c:"py"}, AUS:{n:"Australia",c:"au"}, TUR:{n:"Turkey",c:"tr"} },
      standings:[["USA",6,"+5"],["AUS",3,"0"],["PAR",3,"−2"],["TUR",0,"−3"]] },
    { id:"E", name:"GROUP E", layout:["GER","CUW","CIV","ECU"],
      teams:{ GER:{n:"Germany",c:"de"}, CUW:{n:"Curaçao",c:"cw"}, CIV:{n:"Ivory Coast",c:"ci"}, ECU:{n:"Ecuador",c:"ec"} },
      standings:[["GER",6,"+7"],["CIV",3,"0"],["ECU",1,"−1"],["CUW",1,"−6"]] },
    { id:"F", name:"GROUP F", layout:["NED","JPN","SWE","TUN"],
      teams:{ NED:{n:"Netherlands",c:"nl"}, JPN:{n:"Japan",c:"jp"}, SWE:{n:"Sweden",c:"se"}, TUN:{n:"Tunisia",c:"tn"} },
      standings:[["NED",4,"+4"],["JPN",4,"+4"],["SWE",3,"0"],["TUN",0,"−8"]] },
    { id:"G", name:"GROUP G", layout:["BEL","EGY","IRN","NZL"],
      teams:{ BEL:{n:"Belgium",c:"be"}, EGY:{n:"Egypt",c:"eg"}, IRN:{n:"Iran",c:"ir"}, NZL:{n:"New Zealand",c:"nz"} },
      standings:[["EGY",4,"+2"],["IRN",2,"0"],["BEL",2,"0"],["NZL",1,"−2"]] },
    { id:"H", name:"GROUP H", layout:["ESP","CPV","KSA","URU"],
      teams:{ ESP:{n:"Spain",c:"es"}, CPV:{n:"Cape Verde",c:"cv"}, KSA:{n:"Saudi Arabia",c:"sa"}, URU:{n:"Uruguay",c:"uy"} },
      standings:[["ESP",4,"+4"],["URU",2,"0"],["CPV",2,"0"],["KSA",1,"−4"]] },
    { id:"I", name:"GROUP I", layout:["FRA","SEN","IRQ","NOR"],
      teams:{ FRA:{n:"France",c:"fr"}, SEN:{n:"Senegal",c:"sn"}, IRQ:{n:"Iraq",c:"iq"}, NOR:{n:"Norway",c:"no"} },
      standings:[["FRA",6,"+5"],["NOR",6,"+4"],["SEN",0,"−3"],["IRQ",0,"−6"]] },
    { id:"J", name:"GROUP J", layout:["ARG","ALG","AUT","JOR"],
      teams:{ ARG:{n:"Argentina",c:"ar"}, ALG:{n:"Algeria",c:"dz"}, AUT:{n:"Austria",c:"at"}, JOR:{n:"Jordan",c:"jo"} },
      standings:[["ARG",6,"+5"],["AUT",3,"0"],["ALG",3,"−2"],["JOR",0,"−3"]] },
    { id:"K", name:"GROUP K", layout:["POR","COD","UZB","COL"],
      teams:{ POR:{n:"Portugal",c:"pt"}, COD:{n:"DR Congo",c:"cd"}, UZB:{n:"Uzbekistan",c:"uz"}, COL:{n:"Colombia",c:"co"} },
      standings:[["COL",3,"+2"],["POR",1,"0"],["COD",1,"0"],["UZB",0,"−2"]] },
    { id:"L", name:"GROUP L", layout:["ENG","CRO","GHA","PAN"],
      teams:{ ENG:{n:"England",c:"gb-eng"}, CRO:{n:"Croatia",c:"hr"}, GHA:{n:"Ghana",c:"gh"}, PAN:{n:"Panama",c:"pa"} },
      standings:[["ENG",3,"+2"],["GHA",3,"+1"],["CRO",0,"−2"],["PAN",0,"−1"]] }
  ];

  // global team registry (abbr -> {n, c}); abbrs are unique across all groups
  const TEAM = {};
  GROUPS.forEach(g => Object.assign(TEAM, g.teams));

  /* ============ MASTER MATCH LIST ============ */
  // stage:"group" matches carry grp; dates are ISO (YYYY-MM-DD); tz is local UTC offset

  };

  /* ============ helpers ============ */
  const WD = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  const MO = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  function dateLabel(iso) {           // "2026-06-11" -> "Thu, Jun 11"
    const dt = new Date(iso + "T12:00:00");
    return WD[dt.getDay()] + ", " + MO[dt.getMonth()] + " " + dt.getDate();
  }
  const shortMD = iso => { const dt = new Date(iso + "T12:00:00"); return MO[dt.getMonth()] + " " + dt.getDate(); };
  function koSlot(s) {
    return s.replace(/^Winner Group /,"Winner ").replace(/^Runner-up Group /,"Runner-up ")
            .replace(/^3rd Group /,"3rd ").replace(/^Winner Match /,"Winner M").replace(/^Loser Match /,"Loser M");
  }
  const fmt12 = mins => {
    let h = Math.floor(mins/60), m = mins%60, ap = h<12 ? "AM" : "PM", hh = h%12 || 12;
    return hh + ":" + String(m).padStart(2,"0") + " " + ap;
  };
  function timeStr(t24, tz) {          // local + WAT (UTC+1)
    const [H,M] = t24.split(":").map(Number);
    const local = H*60 + M;
    let wat = local - tz*60 + 60, day = 0;
    while (wat >= 1440) { wat -= 1440; day++; }
    while (wat < 0)     { wat += 1440; day--; }
    return fmt12(local) + " (local)  |  " + fmt12(wat) + (day>0 ? " +"+day : "") + " (WAT)";
  }
  const gdClass = gd => /^\+/.test(gd) ? "pos" : /^[−-]/.test(gd) ? "neg" : "zero";

  /* ============ orbit coordinates [top, right, bottom, left] ============ */
  const POS = { top:[145,30], right:[260,145], bottom:[145,260], left:[30,145] };
  const POSKEYS = ["top","right","bottom","left"];
  const nodeCoord = (g, abbr) => POS[POSKEYS[g.layout.indexOf(abbr)]];

  function chipPos(a, b) {
    const mx = (a[0]+b[0])/2, my = (a[1]+b[1])/2;
    if (Math.abs(mx-145) < 1 && Math.abs(my-145) < 1) {
      const node = (a[0]+a[1] <= b[0]+b[1]) ? a : b;
      return [ node[0] + (145-node[0])*0.36, node[1] + (145-node[1])*0.36 ];
    }
    return [mx, my];
  }

  function renderGroup(g) {
    const ms = MATCHES.filter(m => m.stage === "group" && m.grp === g.id);
    let lines = "", chips = "", nodes = "";
    ms.forEach(m => {
      const A = nodeCoord(g, m.h), B = nodeCoord(g, m.a);
      lines += m.st === "played"
        ? `<line x1="${A[0]}" y1="${A[1]}" x2="${B[0]}" y2="${B[1]}" stroke="#d4af37" stroke-width="3.5" stroke-linecap="round"/>`
        : `<line x1="${A[0]}" y1="${A[1]}" x2="${B[0]}" y2="${B[1]}" stroke="#4a5876" stroke-width="2.5" stroke-dasharray="6 5"/>`;
      const cp = chipPos(A, B);
      chips += `<div class="chip ${m.st==='upcoming'?'upc':''}" style="left:${cp[0]}px;top:${cp[1]}px;" data-no="${m.no}"
        data-home="${g.teams[m.h].n}" data-away="${g.teams[m.a].n}" data-score="${m.s==='vs'?'Upcoming':m.s}" data-status="${m.st}"
        data-date="${dateLabel(m.d)}" data-t="${m.t}" data-tz="${m.tz}" data-host="${m.host}" data-venue="${m.v}">${m.s}</div>`;
    });
    POSKEYS.forEach((k, i) => {
      const ab = g.layout[i], tm = g.teams[ab], c = POS[k];
      nodes += `<div class="node" style="left:${c[0]-27}px;top:${c[1]-27}px;">
        <img src="${FLAG(tm.c)}" alt="${ab}"><span class="ab">${ab}</span></div>`;
    });
    let rows = "";
    g.standings.forEach(([ab,pts,gd]) => {
      rows += `<tr><td class="fl"><img src="${FLAG(g.teams[ab].c)}"></td><td class="ab">${ab}</td><td class="pt">${pts}</td><td class="gd ${gdClass(gd)}">${gd}</td></tr>`;
    });
    const played = ms.filter(m => m.st === "played").length;
    return `<div class="group"><div class="gtitle">${g.name}</div>
      <div class="gsub">${played} of 6 played</div>
      <div class="stage">
        <svg class="lines" width="290" height="290" viewBox="0 0 290 290">${lines}</svg>
        ${nodes}
        <div class="center"><table>${rows}</table></div>
        ${chips}
      </div></div>`;
  }

  /* ============ Ladder view (ranked stack + bracket lines) ============ */
  // Teams stacked top→bottom by standing. Centre spine links adjacent pairs;
  // side brackets carry the three "skip" pairings (T1–T3, T1–T4 on the left, T2–T4 on the right).
  const LY = [40, 120, 200, 280];          // row centres (y)
  function renderGroupLadder(g) {
    const ms = MATCHES.filter(m => m.stage === "group" && m.grp === g.id);
    const findM = (x, y) => ms.find(m => (m.h===x && m.a===y) || (m.h===y && m.a===x));
    const score = (m, top) => {              // show top-ranked team's goals first
      if (m.st !== "played") return "vs";
      const p = m.s.split("–");
      return (p.length === 2 && m.h !== top) ? p[1] + "–" + p[0] : m.s;
    };
    const T = g.standings.map(s => s[0]);
    const conns = [
      { p:[T[0],T[1]], top:T[0], d:"M145 57 L145 103",                    cx:145, cy:80  },
      { p:[T[1],T[2]], top:T[1], d:"M145 137 L145 183",                   cx:145, cy:160 },
      { p:[T[2],T[3]], top:T[2], d:"M145 217 L145 263",                   cx:145, cy:240 },
      { p:[T[0],T[2]], top:T[0], d:"M72 44 L64 44 L64 200 L72 200",       cx:64,  cy:120 },
      { p:[T[0],T[3]], top:T[0], d:"M72 36 L38 36 L38 284 L72 284",       cx:38,  cy:160 },
      { p:[T[1],T[3]], top:T[1], d:"M218 120 L232 120 L232 284 L218 284", cx:232, cy:200 }
    ];
    let lines = "", chips = "";
    conns.forEach(c => {
      const m = findM(c.p[0], c.p[1]); if (!m) return;
      const played = m.st === "played";
      lines += `<path d="${c.d}" fill="none" stroke="${played?'#d4af37':'#4a5876'}" stroke-width="${played?3:2}" ${played?'':'stroke-dasharray="5 5"'} stroke-linecap="round" stroke-linejoin="round"/>`;
      chips += `<div class="chip ${m.st==='upcoming'?'upc':''}" style="left:${c.cx}px;top:${c.cy}px;" data-no="${m.no}"
        data-home="${g.teams[m.h].n}" data-away="${g.teams[m.a].n}" data-score="${m.s==='vs'?'Upcoming':m.s}" data-status="${m.st}"
        data-date="${dateLabel(m.d)}" data-t="${m.t}" data-tz="${m.tz}" data-host="${m.host}" data-venue="${m.v}">${score(m, c.top)}</div>`;
    });
    let teams = "";
    g.standings.forEach(([ab,pts,gd], i) => {
      const tm = g.teams[ab];
      teams += `<div class="lteam" style="top:${LY[i]}px">
        <img src="${FLAG(tm.c)}" alt="${ab}"><span class="lab">${ab}</span>
        <span class="lstat"><span class="lpts">${pts}</span><span class="lbar">|</span><span class="lgd ${gdClass(gd)}">${gd}</span></span>
      </div>`;
    });
    const played = ms.filter(m => m.st === "played").length;
    return `<div class="group"><div class="gtitle">${g.name}</div>
      <div class="gsub">${played} of 6 played</div>
      <div class="ladder">
        <svg class="lines" width="290" height="320" viewBox="0 0 290 320">${lines}</svg>
        ${teams}${chips}
      </div></div>`;
  }

  /* ============ Fixtures tab ============ */
  const WDF = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  const MOF = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  const fullDateLabel = iso => { const dt = new Date(iso + "T12:00:00"); return WDF[dt.getDay()] + ", " + MOF[dt.getMonth()] + " " + dt.getDate(); };

  function watParts(t24, tz) {
    const [H,M] = t24.split(":").map(Number);
    const local = H*60 + M;
    let wat = local - tz*60 + 60, day = 0;
    while (wat >= 1440) { wat -= 1440; day++; }
    while (wat < 0)     { wat += 1440; day--; }
    return { local, wat, day };
  }

  function fxCard(m) {
    const { local, wat, day } = watParts(m.t, m.tz);
    const isGroup = m.stage === "group";
    const tag = isGroup ? "Group " + m.grp : ROUND_LABEL[m.stage];
    let homeHtml, awayHtml, score, dh, da;
    if (isGroup) {
      const home = TEAM[m.h], away = TEAM[m.a];
      homeHtml = `<span class="fx-team home"><span class="nm">${home.n}</span><img src="${FLAG(home.c)}"></span>`;
      awayHtml = `<span class="fx-team away"><img src="${FLAG(away.c)}"><span class="nm">${away.n}</span></span>`;
      score = m.st === "played" ? m.s : "vs"; dh = home.n; da = away.n;
    } else {
      homeHtml = `<span class="fx-team home ko"><span class="nm">${koSlot(m.s1)}</span></span>`;
      awayHtml = `<span class="fx-team away ko"><span class="nm">${koSlot(m.s2)}</span></span>`;
      score = "vs"; dh = m.s1; da = m.s2;
    }
    return `<div class="fx-card ${m.st}" id="m${m.no}" data-no="${m.no}"
      data-home="${dh}" data-away="${da}" data-score="${m.st==='played'?m.s:'Upcoming'}" data-status="${m.st}"
      data-date="${dateLabel(m.d)}" data-t="${m.t}" data-tz="${m.tz}" data-host="${m.host}" data-venue="${m.v}">
      <div class="fx-time"><div class="fx-no">Match ${m.no}</div>${fmt12(local)}<div class="wat">${fmt12(wat)}${day>0?" +"+day:""} WAT</div></div>
      <div class="fx-match">${homeHtml}<span class="fx-score">${score}</span>${awayHtml}</div>
      <div class="fx-venue"><span class="fx-tag">${tag}</span><img src="${FLAG(m.host)}"><span>${m.v}</span></div>
    </div>`;
  }

  const FX_STAGEDEF = [
    { k:"MD1", label:"Matchday 1",          c:"#4f9dde", max:24 },
    { k:"MD2", label:"Matchday 2",          c:"#46c08a", max:48 },
    { k:"MD3", label:"Matchday 3",          c:"#b57edc", max:72 },
    { k:"R32", label:"Round of 32",         c:"#e09b4a", max:88 },
    { k:"R16", label:"Round of 16",         c:"#df6b6b", max:96 },
    { k:"QF",  label:"Quarter-finals",      c:"#4cc4c4", max:100 },
    { k:"SFF", label:"Semi-finals & Final", c:"#d4af37", max:104 }
  ];
  const FX_PILLS = [["MD1","MD1"],["MD2","MD2"],["MD3","MD3"],["R32","R32"],["R16","R16"],["QF","QF"],["SF + Final","SFF"]];
  const stageOf = no => FX_STAGEDEF.find(s => no <= s.max);
  const hexA = (hex,a) => { const n = parseInt(hex.slice(1),16); return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`; };
  function renderFixtures() {
    let jump = `<div class="fx-jump"><span class="fx-jl">Jump to</span><button class="fx-pill" data-today="1">Today</button>`;
    FX_PILLS.forEach(([lbl,k]) => jump += `<button class="fx-pill" data-stage="${k}">${lbl}</button>`);
    jump += `</div>`;
    const sorted = [...MATCHES].sort((a,b) => a.d.localeCompare(b.d) || a.t.localeCompare(b.t));
    let html = "", curStage = "", curDate = "";
    sorted.forEach(m => {
      const st = stageOf(m.no);
      if (st.k !== curStage) {
        curStage = st.k; curDate = "";
        html += `<div class="fx-stage" id="s-${st.k}" style="background:${hexA(st.c,0.12)};border-left-color:${st.c};color:${st.c};">${st.label}</div>`;
      }
      if (m.d !== curDate) { curDate = m.d; html += `<div class="fx-day">${fullDateLabel(m.d)}</div>`; }
      html += fxCard(m);
    });
    document.getElementById("panel-fixtures").innerHTML = `<div class="fixtures">${jump}${html}</div>`;
  }
  renderFixtures();

  /* ============ Knockout bracket (linear left→right) ============ */
  const ROUND_COL = { R32:0, R16:1, QF:2, SF:3, FINAL:4, "3RD":4 };
  const ROUND_SHORT = { R32:"R32", R16:"R16", QF:"QF", SF:"SF", FINAL:"Final", "3RD":"3rd" };
  const COL_HEAD = ["Round of 32","Round of 16","Quarter-finals","Semi-finals","Final"];

  function renderKnockout() {
    const KO = MATCHES.filter(m => m.stage !== "group");
    const boxW = 158, boxH = 54, colW = 212, rowH = 72, topPad = 50, leftPad = 14;
    const colX = c => leftPad + c*colW;
    const r32order = [74,77,73,75,83,84,81,82,76,78,79,80,86,88,85,87];
    const y = {};
    r32order.forEach((no,i) => y[no] = topPad + i*rowH + boxH/2);
    const feeders = m => [m.s1, m.s2].map(s => { const mm = s.match(/Match (\d+)/); return mm ? +mm[1] : null; });
    ["R16","QF","SF","FINAL"].forEach(rd =>
      KO.filter(m => m.stage === rd).forEach(m => { const [f1,f2] = feeders(m); y[m.no] = (y[f1]+y[f2])/2; }));
    y[103] = y[104] + 122;
    const W = colX(4) + boxW + leftPad, H = topPad + 16*rowH + 28;

    let lines = "";
    ["R16","QF","SF","FINAL"].forEach(rd => KO.filter(m => m.stage === rd).forEach(m => {
      const col = ROUND_COL[rd], [f1,f2] = feeders(m);
      const xfR = colX(col-1) + boxW, xc = colX(col), midX = xfR + (xc-xfR)/2;
      lines += `<path d="M${xfR} ${y[f1]} H${midX} M${xfR} ${y[f2]} H${midX} M${midX} ${y[f1]} V${y[f2]} M${midX} ${y[m.no]} H${xc}" stroke="#3a4a6a" stroke-width="1.5" fill="none"/>`;
    }));

    let heads = "";
    COL_HEAD.forEach((h,c) => heads += `<div class="ko-col-head" style="left:${colX(c)}px;width:${boxW}px;">${h}</div>`);

    let boxes = "";
    KO.forEach(m => {
      const col = ROUND_COL[m.stage];
      boxes += `<div class="ko-box ${m.stage==='FINAL'?'ko-final':''} ${m.stage==='3RD'?'ko-third':''}"
        style="left:${colX(col)}px;top:${y[m.no]-boxH/2}px;width:${boxW}px;height:${boxH}px;" data-no="${m.no}"
        data-home="${m.s1}" data-away="${m.s2}" data-status="upcoming" data-score="Upcoming"
        data-date="${dateLabel(m.d)}" data-t="${m.t}" data-tz="${m.tz}" data-host="${m.host}" data-venue="${m.v}">
        <div class="ko-meta"><span>M${m.no} · ${ROUND_SHORT[m.stage]}</span><span>${shortMD(m.d)}</span></div>
        <div class="ko-slot">${koSlot(m.s1)}</div>
        <div class="ko-slot">${koSlot(m.s2)}</div>
      </div>`;
    });

    document.getElementById("panel-knockout").innerHTML =
      `<p class="hint">Hover any match for details · slots fill in as groups finish</p>
       <div class="bracket-wrap"><div class="bracket" style="width:${W}px;height:${H}px;">
         <svg class="ko-lines" width="${W}" height="${H}">${lines}</svg>${heads}${boxes}
       </div></div>`;
  }
  renderKnockout();

  /* ============ tabs ============ */
  document.querySelectorAll(".tab").forEach(t => {
    t.addEventListener("click", () => {
      document.querySelectorAll(".tab").forEach(x => x.classList.toggle("active", x === t));
      const id = t.dataset.tab;
      document.querySelectorAll(".panel").forEach(p => p.classList.toggle("active", p.id === "panel-" + id));
    });
  });

  /* ============ hover tooltip ============ */
  const tip = document.getElementById("tip");
  const elTeams=document.getElementById("tipTeams"), elScore=document.getElementById("tipScore"),
        elDate=document.getElementById("tipDate"), elTime=document.getElementById("tipTime"),
        elVenue=document.getElementById("tipVenue"), elHost=document.getElementById("tipHostFlag");

  function showTip(e) {
    const chip = e.currentTarget, d = chip.dataset, upc = d.status === "upcoming";
    elTeams.textContent = d.home + " – " + d.away;
    elScore.textContent = upc ? "Upcoming" : d.score;
    elDate.textContent = d.date;
    elTime.textContent = timeStr(d.t, Number(d.tz));
    elVenue.textContent = d.venue;
    elHost.src = FLAG(d.host);
    tip.classList.toggle("upc", upc);
    tip.classList.add("show");
    const r = chip.getBoundingClientRect(), tw = 250, th = tip.offsetHeight || 120;
    let left = r.left + r.width/2 - tw/2;
    left = Math.max(6, Math.min(left, window.innerWidth - tw - 6));
    let top = r.top - th - 10;
    if (top < 6) top = r.bottom + 10;
    tip.style.left = left + "px";
    tip.style.top = top + "px";
  }
  const hideTip = () => tip.classList.remove("show");
  // bind hover + click to a match element (hover tooltips only where wanted)
  function bindMatchEl(el, hover) {
    if (hover) { el.addEventListener("mouseenter", showTip); el.addEventListener("mouseleave", hideTip); }
    el.addEventListener("click", () => openMatch(+el.dataset.no));
  }
  document.querySelectorAll(".ko-box").forEach(el => bindMatchEl(el, true));
  document.querySelectorAll(".fx-card").forEach(el => bindMatchEl(el, false));

  /* ============ match summary modal ============ */
  const modalBg = document.getElementById("modalBg");
  function goalsCol(det, abbr) {
    return det.g.filter(x => x.t === abbr).map(x => {
      const tag = x.type === "pen" ? ' <span class="tag">(pen)</span>' : x.type === "og" ? ' <span class="tag">(OG)</span>' : "";
      return `<div class="m-goal">${x.p} <span class="min">${x.m}'</span>${tag}</div>`;
    }).join("");
  }
  function openMatch(no) {
    const m = MByNo[no]; if (!m) return;
    tip.classList.remove("show");
    const isGroup = m.stage === "group";
    const { local, wat, day } = watParts(m.t, m.tz);
    const timeLine = `${fmt12(local)} (local) &nbsp;|&nbsp; ${fmt12(wat)}${day>0?" +"+day:""} (WAT)`;
    let homeName, awayName, homeImg = "", awayImg = "", scoreHtml;
    if (isGroup) {
      const h = TEAM[m.h], a = TEAM[m.a];
      homeName = h.n; awayName = a.n;
      homeImg = `<img src="${FLAG(h.c)}">`; awayImg = `<img src="${FLAG(a.c)}">`;
      scoreHtml = m.st === "played" ? `<span class="m-score">${m.s}</span>` : `<span class="m-score upc">vs</span>`;
    } else {
      homeName = koSlot(m.s1); awayName = koSlot(m.s2);
      scoreHtml = `<span class="m-score upc">vs</span>`;
    }
    const det = MATCHDETAIL[no];
    let body = "";
    if (m.st === "played" && det) {
      if (det.g.length) body += `<div class="m-sec"><div class="m-sec-h">⚽ Goals</div><div class="m-goals"><div class="col home">${goalsCol(det,m.h)}</div><div class="col away">${goalsCol(det,m.a)}</div></div></div>`;
      if (det.r.length) body += `<div class="m-sec"><div class="m-sec-h">🟥 Red cards</div>` + det.r.map(x => `<div class="m-goal">${x.p} <span class="min">${x.m}'</span> <span class="tag">${x.t}</span></div>`).join("") + `</div>`;
      if (det.s) body += `<div class="m-sec"><div class="m-sec-h">Summary</div><div class="m-summary">${det.s}</div></div>`;
      const q = encodeURIComponent(`${homeName} vs ${awayName} 2026 World Cup highlights`);
      body += `<a class="m-watch" href="https://www.youtube.com/results?search_query=${q}" target="_blank" rel="noopener">▶ Watch highlights</a>`;
    } else {
      body = `<div class="m-note">This match hasn't been played yet.</div>`;
    }
    document.getElementById("modalContent").innerHTML = `
      <button class="modal-close" aria-label="Close">×</button>
      <div class="modal-head">
        <div class="m-teams">
          <span class="m-team h">${homeName} ${homeImg}</span>
          ${scoreHtml}
          <span class="m-team a">${awayImg} ${awayName}</span>
        </div>
        <div class="m-meta">M${m.no} · ${isGroup ? ("Group " + m.grp) : ROUND_LABEL[m.stage]} · ${dateLabel(m.d)}<br>${timeLine}<br><img class="hostflag" src="${FLAG(m.host)}">${m.v}</div>
      </div>
      <div class="modal-body">${body}</div>`;
    modalBg.classList.add("show");
  }
  modalBg.addEventListener("click", e => { if (e.target === modalBg || e.target.classList.contains("modal-close")) modalBg.classList.remove("show"); });
  document.addEventListener("keydown", e => { if (e.key === "Escape") modalBg.classList.remove("show"); });

  // ===== Group-stage view toggle (orbit ↔ ladder) =====
  function paintGroups(view) {
    const fn = view === "ladder" ? renderGroupLadder : renderGroup;
    document.getElementById("groups").innerHTML = GROUPS.map(fn).join("");
    document.querySelectorAll("#groups .chip").forEach(el => bindMatchEl(el, true));
  }
  let groupView = "orbit";
  try { groupView = localStorage.getItem("wc-group-view") || "orb
