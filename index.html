<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 World Cup — Visual Guide</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-weight: 400 !important; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #0e1117; color: #e8edf4; padding: 22px 12px 50px;
    -webkit-font-smoothing: antialiased;
  }
  .page { max-width: 1340px; margin: 0 auto; }
  h1 { text-align: center; font-size: 23px; letter-spacing: .5px; margin-bottom: 3px; }
  .subtitle { text-align: center; color: #93a1b5; font-size: 13px; margin-bottom: 14px; }

  /* tabs */
  .tabs { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .tab {
    background: #1a2231; color: #aeb9c9; border: 1px solid #2c3850;
    padding: 9px 22px; border-radius: 999px; font-size: 13.5px; cursor: pointer;
    transition: all .15s ease;
  }
  .tab:hover { border-color: #44557a; color: #d7deea; }
  .tab.active { background: #d4af37; color: #1a1407; border-color: #d4af37; }
  .panel { display: none; } .panel.active { display: block; }
  .placeholder { text-align: center; color: #6b7891; padding: 70px 20px; font-size: 14px; }
  .placeholder strong { color: #93a1b5; font-weight: 800; }

  .hint { text-align: center; color: #6b7891; font-size: 12px; margin-bottom: 6px; }
  .legend { display: flex; justify-content: center; gap: 18px; margin-bottom: 18px; font-size: 11.5px; color: #93a1b5; }
  .legend span { display: inline-flex; align-items: center; gap: 6px; }
  .swatch { width: 20px; height: 4px; border-radius: 2px; display: inline-block; }
  .swatch.gold { background: #d4af37; } .swatch.grey { background: #4a5876; }

  .groups { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  @media (max-width: 1100px) { .groups { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 560px)  { .groups { grid-template-columns: 1fr; } }

  .group {
    background: #151c28; border: 1px solid #232e42; border-radius: 14px;
    padding: 12px 6px 14px;
  }
  .group .gtitle { text-align: center; font-size: 13px; font-weight: 800; letter-spacing: 1px; color: #d4af37; margin-bottom: 1px; }
  .group .gsub { text-align: center; font-size: 9.5px; letter-spacing: .3px; color: #6b7891; margin-bottom: 5px; }

  .stage { position: relative; width: 290px; max-width: 100%; height: 290px; margin: 0 auto; }
  svg.lines { position: absolute; top: 0; left: 0; overflow: visible; }

  .node {
    position: absolute; width: 54px; height: 54px; border-radius: 50%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: #1a2330; border: 2px solid #3a4a6a; z-index: 3; text-align: center;
  }
  .node img { width: 30px; height: 20px; object-fit: cover; border-radius: 3px; box-shadow: 0 1px 3px rgba(0,0,0,.5); }
  .node .ab { font-size: 9px; font-weight: 800; letter-spacing: .5px; margin-top: 2px; color: #cfd8e6; }

  .chip {
    position: absolute; z-index: 5; transform: translate(-50%, -50%);
    background: #d4af37; color: #1a1407; font-weight: 800; font-size: 11px;
    padding: 3px 7px; border-radius: 7px; white-space: nowrap; cursor: pointer;
    box-shadow: 0 2px 6px rgba(0,0,0,.45); transition: transform .12s ease, box-shadow .12s ease;
  }
  .chip:hover { transform: translate(-50%, -50%) scale(1.15); box-shadow: 0 3px 12px rgba(212,175,55,.55); }
  .chip.upc { background: #2c3850; color: #aeb9c9; }
  .chip.upc:hover { box-shadow: 0 3px 12px rgba(74,88,118,.6); }

  .center {
    position: absolute; width: 110px; height: 110px; left: 90px; top: 90px; border-radius: 50%;
    background: #0c1320; border: 2px solid #d4af37; z-index: 3;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    box-shadow: 0 0 22px rgba(212,175,55,.22);
  }
  .center table { border-collapse: collapse; }
  .center td { font-size: 9.5px; padding: 1px 2px; line-height: 1.25; }
  .center td.fl { width: 16px; } .center td.fl img { width: 14px; height: 10px; object-fit: cover; border-radius: 1.5px; display: block; }
  .center td.ab { font-weight: 800; color: #e8edf4; text-align: left; padding-right: 4px; }
  .center td.pt { color: #d4af37; font-weight: 800; text-align: right; }
  .center td.gd { font-weight: 700; text-align: right; width: 22px; }
  .center td.gd.pos { color: #5fcf97; } .center td.gd.neg { color: #e0746a; } .center td.gd.zero { color: #8a97ab; }

  /* ===== Ladder view (ranked stack + bracket lines) ===== */
  .ladder { position: relative; width: 290px; max-width: 100%; height: 320px; margin: 2px auto 0; }
  .ladder svg.lines { position: absolute; top: 0; left: 0; overflow: visible; }
  .lteam { position: absolute; left: 50%; transform: translate(-50%, -50%); width: 146px; height: 34px;
    display: flex; align-items: center; gap: 8px; padding: 0 10px; z-index: 3;
    background: #1a2330; border: 1.5px solid #3a4a6a; border-radius: 9px; }
  .lteam img { width: 24px; height: 16px; object-fit: cover; border-radius: 2px; box-shadow: 0 1px 2px rgba(0,0,0,.5); flex: none; }
  .lteam .lab { font-size: 13px; font-weight: 800; letter-spacing: .5px; color: #e8edf4; }
  .lteam .lstat { margin-left: auto; font-size: 11px; display: flex; align-items: center; gap: 5px; }
  .lteam .lpts { color: #d4af37; font-weight: 800; }
  .lteam .lbar { color: #44557a; }
  .lteam .lgd.pos { color: #5fcf97; } .lteam .lgd.neg { color: #e0746a; } .lteam .lgd.zero { color: #8a97ab; }

  /* ===== Group-stage view toggle ===== */
  .gs-toggle { display: flex; justify-content: center; align-items: center; gap: 8px; margin-bottom: 16px; }
  .gs-label { font-size: 11px; color: #6b7891; margin-right: 2px; }
  .gs-pill { background: #1a2231; color: #aeb9c9; border: 1px solid #2c3850; padding: 6px 18px;
    border-radius: 999px; font-size: 12.5px; cursor: pointer; transition: all .12s ease; }
  .gs-pill:hover { border-color: #44557a; color: #d7deea; }
  .gs-pill.active { background: #d4af37; color: #1a1407; border-color: #d4af37; }

  /* ===== Fixtures ===== */
  .fixtures { max-width: 1000px; margin: 0 auto; }
  .fx-day { margin: 20px 0 9px; padding-bottom: 5px; font-size: 13.5px; font-weight: 800; color: #d4af37;
    letter-spacing: .4px; border-bottom: 1px solid #232e42; }
  .fx-day:first-child { margin-top: 2px; }
  .fx-card { display: grid; grid-template-columns: 116px 1fr 268px; align-items: center; gap: 14px;
    background: #151c28; border: 1px solid #232e42; border-left-width: 3px; border-radius: 10px;
    padding: 11px 16px; margin-bottom: 8px; cursor: pointer; transition: background .12s, border-color .12s; }
  .fx-card:hover { background: #1a2230; border-color: #3a4a6a; }
  .fx-card.played { border-left-color: #d4af37; }
  .fx-card.upcoming { border-left-color: #4a5876; }
  .fx-time { font-size: 12px; color: #c4cedd; line-height: 1.3; }
  .fx-time .wat { font-size: 10px; color: #7d8aa0; }
  .fx-match { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 12px; }
  .fx-team { display: flex; align-items: center; gap: 8px; font-size: 13.5px; color: #e8edf4; }
  .fx-team.home { justify-content: flex-end; text-align: right; }
  .fx-team.away { justify-content: flex-start; }
  .fx-team img { width: 26px; height: 18px; object-fit: cover; border-radius: 3px; box-shadow: 0 1px 2px rgba(0,0,0,.5); flex: none; }
  .fx-score { font-size: 16px; font-weight: 800; color: #d4af37; min-width: 56px; text-align: center; }
  .fx-card.upcoming .fx-score { color: #7d8aa0; font-size: 12.5px; font-weight: 700; }
  .fx-venue { font-size: 11px; color: #8a97ab; display: flex; align-items: center; justify-content: flex-end; gap: 7px; text-align: right; }
  .fx-venue img { width: 15px; height: 11px; object-fit: cover; border-radius: 2px; flex: none; }
  .fx-tag { background: #222c3f; color: #aeb9c9; font-size: 9.5px; padding: 2px 7px; border-radius: 5px; white-space: nowrap; flex: none; }
  .fx-no { font-size: 9.5px; color: #d4af37; font-weight: 800; margin-bottom: 1px; }
  .fx-team.ko .nm { color: #9aa7bd; font-size: 12.5px; }
  @media (max-width: 680px) {
    .fx-card { grid-template-columns: 1fr; gap: 9px; text-align: center; }
    .fx-venue { justify-content: center; }
    .fx-time { display: flex; gap: 8px; justify-content: center; align-items: baseline; }
  }

  /* ===== Fixtures jump bar ===== */
  .fx-jump { position: sticky; top: 0; z-index: 10; display: flex; flex-wrap: wrap; gap: 6px; align-items: center;
    background: #0e1117; padding: 9px 0 10px; margin-bottom: 6px; border-bottom: 1px solid #1c2433; }
  .fx-jl { font-size: 11px; color: #6b7891; margin-right: 4px; }
  .fx-pill { background: #1a2231; color: #aeb9c9; border: 1px solid #2c3850; padding: 5px 13px; border-radius: 999px;
    font-size: 12px; cursor: pointer; transition: all .12s ease; }
  .fx-pill:hover { background: #d4af37; color: #1a1407; border-color: #d4af37; }
  .fx-card, .fx-day, .fx-stage { scroll-margin-top: 54px; }
  .fx-stage { display: flex; align-items: center; margin: 26px 0 8px; padding: 10px 15px;
    border-radius: 10px; border-left: 4px solid; font-size: 14px; letter-spacing: .5px; }
  .fx-stage:first-of-type { margin-top: 2px; }

  /* ===== Match summary modal ===== */
  .modal-bg { position: fixed; inset: 0; background: rgba(6,9,14,.74); z-index: 100; display: none;
    align-items: flex-start; justify-content: center; padding: 42px 16px; overflow: auto; }
  .modal-bg.show { display: flex; }
  .modal { background: #141b27; border: 1px solid #2c3850; border-radius: 16px; width: 470px; max-width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,.6); position: relative; }
  .modal-close { position: absolute; top: 10px; right: 13px; cursor: pointer; color: #7d8aa0; font-size: 22px;
    line-height: 1; background: none; border: none; z-index: 2; }
  .modal-close:hover { color: #e8edf4; }
  .modal-head { padding: 20px 20px 16px; border-bottom: 1px solid #232e42; }
  .m-teams { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 12px; }
  .m-team { display: flex; align-items: center; gap: 9px; font-size: 15px; color: #e8edf4; }
  .m-team.h { justify-content: flex-end; text-align: right; }
  .m-team img { width: 30px; height: 20px; object-fit: cover; border-radius: 3px; box-shadow: 0 1px 3px rgba(0,0,0,.5); flex: none; }
  .m-score { font-size: 22px; font-weight: 800; color: #d4af37; white-space: nowrap; }
  .m-score.upc { font-size: 13px; color: #7d8aa0; font-weight: 700; }
  .m-pen { display: block; font-size: 11.5px; color: #8a97ab; font-weight: 700; margin-top: 2px; }
  .t-pen { display: block; font-size: 10.5px; color: #f0c64a; font-weight: 700; margin-top: 1px; white-space: nowrap; }
  .m-team.win { color: #f0c64a; font-weight: 800; }
  .m-meta { text-align: center; color: #9aa7bd; font-size: 11.5px; margin-top: 11px; line-height: 1.65; }
  .m-meta .hostflag { display: inline-block; vertical-align: middle; width: 15px; height: 11px; object-fit: cover; border-radius: 2px; margin-right: 5px; }
  .modal-body { padding: 16px 20px 20px; }
  .m-sec { margin-bottom: 15px; }
  .m-sec:last-child { margin-bottom: 0; }
  .m-sec-h { font-size: 12px; color: #93a1b5; font-weight: 800; margin-bottom: 8px; }
  .m-goals { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .m-goals .col.away { text-align: right; }
  .m-goal { font-size: 12.5px; color: #dfe6f0; line-height: 1.75; }
  .m-goal .min { color: #8a97ab; }
  .m-goal .tag { color: #d4af37; font-size: 10px; margin-left: 2px; }
  .m-summary { font-size: 12.5px; color: #c4cedd; line-height: 1.65; }
  .m-watch { display: inline-block; margin-top: 4px; background: #d4af37; color: #1a1407; font-weight: 800;
    font-size: 12px; padding: 8px 15px; border-radius: 8px; text-decoration: none; }
  .m-watch:hover { background: #e6c34a; }
  .m-note { color: #7d8aa0; font-size: 13px; text-align: center; padding: 14px 0 4px; }

  /* ===== back-to-top button ===== */
  #toTop { position: fixed; bottom: 24px; right: 24px; z-index: 60; width: 46px; height: 46px;
    border-radius: 50%; background: #d4af37; color: #1a1407; border: none; cursor: pointer;
    font-size: 22px; line-height: 1; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 14px rgba(0,0,0,.5); opacity: .85; transition: opacity .15s, transform .15s; }
  #toTop:hover { opacity: 1; transform: translateY(-2px); }

  /* ===== Knockout bracket ===== */
  .bracket-wrap { overflow: auto; max-height: 78vh; border: 1px solid #232e42; border-radius: 12px; background: #10151e; }
  .bracket { position: relative; }
  .ko-col-head { position: absolute; top: 16px; font-size: 11px; color: #9aa7bd; font-weight: 800; letter-spacing: .5px; text-align: center; }
  .ko-box {
    position: absolute; background: #151c28; border: 1px solid #2c3850; border-radius: 8px;
    padding: 5px 8px; cursor: pointer; z-index: 2; overflow: hidden;
    transition: border-color .12s, background .12s;
  }
  .ko-box:hover { border-color: #d4af37; background: #1a2230; }
  .ko-box.ko-final { border-color: #d4af37; box-shadow: 0 0 16px rgba(212,175,55,.22); }
  .ko-box.ko-third { border-style: dashed; }
  .ko-meta { font-size: 8.5px; color: #6b7891; display: flex; justify-content: space-between; margin-bottom: 3px; }
  .ko-slot { font-size: 11px; color: #cfd8e6; line-height: 1.5; display: flex; align-items: center; justify-content: space-between; gap: 6px; }
  .ko-name { display: flex; align-items: center; gap: 5px; min-width: 0; overflow: hidden; }
  .ko-flag { width: 16px; height: 11px; object-fit: cover; border-radius: 2px; flex: none; box-shadow: 0 1px 2px rgba(0,0,0,.5); }
  .ko-ab { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .ko-slot.tbd .ko-ab { color: #93a0b6; font-size: 10.5px; }
  .ko-slot.win .ko-ab { color: #f0c64a; font-weight: 800; }
  .ko-gf { flex: none; font-size: 12px; font-weight: 800; color: #aeb9c9; }
  .ko-slot.win .ko-gf { color: #f0c64a; }
  .ko-pen { font-size: 10px; font-weight: 700; color: #8a97ab; margin-right: 3px; }
  .ko-slot.win .ko-pen { color: #f0c64a; }
  .ko-box.played { background: #161f2e; border-color: #3a4a6a; }
  .ko-box.played::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: #d4af37; border-radius: 8px 0 0 8px; }
  svg.ko-lines { position: absolute; top: 0; left: 0; z-index: 1; }
  .ko-desktop { display: block; }
  .ko-mobile { display: none; }
  .kl-round { margin-bottom: 16px; }
  .kl-rh { font-size: 12px; font-weight: 800; color: #9aa7bd; letter-spacing: .5px; margin: 0 0 8px 2px; }
  .kl-card { position: relative; background: #151c28; border: 1px solid #2c3850; border-radius: 8px; padding: 7px 12px; margin-bottom: 8px; cursor: pointer; }
  .kl-card.played { background: #161f2e; border-color: #3a4a6a; }
  .kl-card.played::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: #d4af37; border-radius: 8px 0 0 8px; }
  .kl-card .ko-meta { font-size: 10px; }
  .kl-card .ko-slot { font-size: 14px; }
  .kl-card .ko-flag { width: 20px; height: 14px; }
  @media (max-width: 680px) {
    .ko-desktop { display: none; }
    .ko-mobile { display: block; }
  }

  #tip {
    position: fixed; z-index: 50; pointer-events: none; opacity: 0; transition: opacity .12s ease;
    width: 250px; background: #1b2536; border: 1px solid #34425e; border-radius: 11px;
    padding: 11px 12px; box-shadow: 0 10px 30px rgba(0,0,0,.55);
  }
  #tip.show { opacity: 1; }
  #tip .t-head { font-size: 12.5px; font-weight: 800; display: flex; align-items: baseline; gap: 6px;
    padding-bottom: 8px; margin-bottom: 8px; border-bottom: 1px solid #2c3850; }
  #tip .t-score { margin-left: auto; color: #d4af37; font-size: 14px; }
  #tip.upc .t-score { color: #8a97ab; font-size: 11px; font-weight: 700; border: 1px solid #3a4a6a; padding: 1px 6px; border-radius: 5px; }
  #tip .t-row { display: flex; gap: 7px; font-size: 11.5px; color: #c4cedd; margin-top: 5px; align-items: flex-start; line-height: 1.35; }
  #tip .t-row .ic { width: 16px; text-align: center; flex: none; }
  #tip .hostflag { width: 15px; height: 11px; object-fit: cover; border-radius: 2px; display: block; margin-top: 1px; box-shadow: 0 1px 2px rgba(0,0,0,.5); }
  #tip .t-flag { width: 18px; height: 12px; object-fit: cover; border-radius: 2px; vertical-align: middle; margin-right: 4px; box-shadow: 0 1px 2px rgba(0,0,0,.5); }
  #tip .t-head .nm { vertical-align: middle; }
</style>
</head>
<body>
<div class="page">
  <h1>2026 World Cup — Visual Guide</h1>
  <p class="subtitle">Group stage · knockout bracket · full schedule</p>

  <div class="tabs">
    <button class="tab active" data-tab="group">Group Stage</button>
    <button class="tab" data-tab="knockout">Knockout Stage</button>
    <button class="tab" data-tab="fixtures">Fixtures</button>
  </div>

  <!-- ===================== GROUP STAGE ===================== -->
  <div class="panel active" id="panel-group">
    <p class="hint">Hover any score for match details · click to open the full summary</p>
    <div class="gs-toggle">
      <span class="gs-label">View</span>
      <button class="gs-pill" data-view="orbit">Orbit</button>
      <button class="gs-pill" data-view="ladder">Ladder</button>
    </div>
    <div class="legend">
      <span><i class="swatch gold"></i> Played</span>
      <span><i class="swatch grey"></i> Upcoming</span>
    </div>
    <div class="groups" id="groups"></div>
  </div>

  <!-- ===================== KNOCKOUT STAGE ===================== -->
  <div class="panel" id="panel-knockout">
    <div class="placeholder"><strong>Knockout Stage bracket</strong><br>Coming next — the linear Round of 32 → Final bracket.</div>
  </div>

  <!-- ===================== FIXTURES ===================== -->
  <div class="panel" id="panel-fixtures">
    <div class="placeholder"><strong>Fixtures</strong><br>Coming next — every match in date order.</div>
  </div>

  <!-- match summary modal -->
  <div class="modal-bg" id="modalBg"><div class="modal" id="modalContent"></div></div>

  <!-- shared hover tooltip -->
  <div id="tip">
    <div class="t-head"><span id="tipTeams"></span><span class="t-score" id="tipScore"></span></div>
    <div class="t-row"><span class="ic">📅</span><span id="tipDate"></span></div>
    <div class="t-row"><span class="ic">🕘</span><span id="tipTime"></span></div>
    <div class="t-row"><span class="ic"><img id="tipHostFlag" class="hostflag" alt=""></span><span id="tipVenue"></span></div>
  </div>

  <button id="toTop" aria-label="Back to top" title="Back to top">↑</button>
</div>

<script>
  const FLAG = code => `https://flagcdn.com/w40/${code}.png`;

  /* ============ GROUP METADATA (teams, layout, standings) ============ */
  const GROUPS = [
    { id:"A", name:"GROUP A", layout:["MEX","CZE","KOR","RSA"],
      teams:{ MEX:{n:"Mexico",c:"mx"}, CZE:{n:"Czechia",c:"cz"}, KOR:{n:"South Korea",c:"kr"}, RSA:{n:"South Africa",c:"za"} },
      standings:[["MEX",9,"+6"],["RSA",4,"−1"],["KOR",3,"−1"],["CZE",1,"−4"]] },
    { id:"B", name:"GROUP B", layout:["CAN","BIH","QAT","SUI"],
      teams:{ CAN:{n:"Canada",c:"ca"}, BIH:{n:"Bosnia & Herzegovina",c:"ba"}, QAT:{n:"Qatar",c:"qa"}, SUI:{n:"Switzerland",c:"ch"} },
      standings:[["SUI",7,"+4"],["CAN",4,"+5"],["BIH",4,"−1"],["QAT",1,"−8"]] },
    { id:"C", name:"GROUP C", layout:["BRA","MAR","HAI","SCO"],
      teams:{ BRA:{n:"Brazil",c:"br"}, MAR:{n:"Morocco",c:"ma"}, HAI:{n:"Haiti",c:"ht"}, SCO:{n:"Scotland",c:"gb-sct"} },
      standings:[["BRA",7,"+6"],["MAR",7,"+3"],["SCO",3,"−3"],["HAI",0,"−6"]] },
    { id:"D", name:"GROUP D", layout:["USA","PAR","AUS","TUR"],
      teams:{ USA:{n:"United States",c:"us"}, PAR:{n:"Paraguay",c:"py"}, AUS:{n:"Australia",c:"au"}, TUR:{n:"Turkey",c:"tr"} },
      standings:[["USA",6,"+4"],["AUS",4,"0"],["PAR",4,"−2"],["TUR",3,"−2"]] },
    { id:"E", name:"GROUP E", layout:["GER","CUW","CIV","ECU"],
      teams:{ GER:{n:"Germany",c:"de"}, CUW:{n:"Curaçao",c:"cw"}, CIV:{n:"Ivory Coast",c:"ci"}, ECU:{n:"Ecuador",c:"ec"} },

    54:{g:[{t:"BIH",p:"Kerim Alajbegović",m:"29"},{t:"BIH",p:"Sultan Al-Brake",m:"34",type:"og"},{t:"QAT",p:"Hassan Al-Haydos",m:"42"},{t:"BIH",p:"Ermin Mahmić",m:"80"}],r:[],s:"18-year-old Kerim Alajbegović became one of the youngest scorers in World Cup history before a Džeko volley deflected in off Al-Brake for an own goal. Al-Haydos replied for Qatar, but Mahmić's late strike sealed a 3–1 win that left Bosnia third — enough to reach the last 32 — and eliminated Qatar."},
    49:{g:[{t:"BRA",p:"Vinícius Júnior",m:"7"},{t:"BRA",p:"Vinícius Júnior",m:"45+1"},{t:"BRA",p:"Matheus Cunha",m:"60"}],r:[],s:"Vinícius Júnior rounded the keeper to open early and headed in a second in first-half stoppage time, before Matheus Cunha finished off a Guimarães run after the break. Brazil top Group C and send Scotland out."},
    50:{g:[{t:"HAI",p:"Yassine Bounou",m:"10",type:"og"},{t:"MAR",p:"Achraf Hakimi",m:"39"},{t:"HAI",p:"Wilson Isidor",m:"43"},{t:"MAR",p:"Ismael Saibari",m:"45+1"},{t:"MAR",p:"Soufiane Rahimi",m:"78"},{t:"MAR",p:"Gessime Yassine",m:"89"}],r:[],s:"Already-eliminated Haiti twice led — through an early goal credited as a Bounou own goal and Wilson Isidor's stunner — but Morocco hit back through Hakimi and Saibari before late goals from Rahimi and Yassine completed a 4–2 comeback that secured second place in Group C."},
    1:{g:[{t:"MEX",p:"Julián Quiñones",m:"9"},{t:"MEX",p:"Raúl Jiménez",m:"67"}],r:[{t:"RSA",p:"Sphephelo Sithole",m:"49"},{t:"RSA",p:"Themba Zwane",m:"85"},{t:"MEX",p:"César Montes",m:"90+2"}],s:"Mexico opened the tournament with a dominant win at the Azteca — Quiñones struck early and Jiménez headed in his first World Cup goal. The match made history with three red cards."},
    2:{g:[{t:"CZE",p:"Ladislav Krejčí",m:"59"},{t:"KOR",p:"Hwang In-beom",m:"67"},{t:"KOR",p:"Oh Hyeon-gyu",m:"80"}],r:[],s:"South Korea came from behind after Krejčí's header, Hwang In-beom levelling before substitute Oh Hyeon-gyu struck the 80th-minute winner."},
    27:{g:[{t:"CZE",p:"Michal Sadílek",m:"6"},{t:"RSA",p:"Teboho Mokoena",m:"83",type:"pen"}],r:[],s:"Czechia led early through Sadílek, but South Africa snatched a point when Mokoena converted a late penalty after a handball."},
    26:{g:[{t:"MEX",p:"Luis Romo",m:"50"}],r:[],s:"Mexico clinched top spot and became the first team into the knockouts, Romo punishing a goalkeeping blunder. South Korea pressed late but were denied."},

    8:{g:[{t:"SUI",p:"Breel Embolo",m:"17",type:"pen"},{t:"QAT",p:"Boualem Khoukhi",m:"90+4"}],r:[],s:"Embolo's penalty looked set to win it for a dominant Switzerland, but captain Khoukhi headed home deep in stoppage time to earn Qatar their first-ever World Cup point."},
    28:{g:[{t:"SUI",p:"Johan Manzambi",m:"74"},{t:"SUI",p:"Ruben Vargas",m:"84"},{t:"SUI",p:"Johan Manzambi",m:"90"},{t:"BIH",p:"Ermin Mahmić",m:"90+3"},{t:"SUI",p:"Granit Xhaka",m:"90+7",type:"pen"}],r:[{t:"BIH",p:"Tarik Muharemović",m:"80"}],s:"Switzerland blew the game open late, 20-year-old substitute Manzambi scoring twice after Muharemović's red card. Mahmić pulled one back before Xhaka sealed it from the spot."},
    25:{g:[{t:"CAN",p:"Cyle Larin",m:"16"},{t:"CAN",p:"Jonathan David",m:"29"},{t:"CAN",p:"Jonathan David",m:"45+3"},{t:"CAN",p:"Younes Saliba",m:"64"},{t:"CAN",p:"Mohammed Al-Manai",m:"75",type:"og"},{t:"CAN",p:"Jonathan David",m:"90+2"}],r:[{t:"QAT",p:"Homam El Amin",m:"32"},{t:"QAT",p:"Assim Madibo",m:"53"}],s:"Canada secured their first-ever World Cup win in style, Jonathan David hitting a hat-trick against a Qatar side reduced to nine men by two red cards."},
    5:{g:[{t:"MAR",p:"Ismael Saibari",m:"21"},{t:"BRA",p:"Vinícius Júnior",m:"32"}],r:[],s:"Saibari dinked Alisson to put Morocco ahead before Vinícius Júnior rifled in an equaliser; a late Alisson double save preserved a point for Brazil."},
    6:{g:[{t:"SCO",p:"John McGinn",m:"28"}],r:[],s:"McGinn's deflected effort earned Scotland a nervy win — their first at a World Cup since 1990 — to go top of Group C."},
    4:{g:[{t:"USA",p:"Damián Bobadilla",m:"7",type:"og"},{t:"USA",p:"Folarin Balogun",m:"31"},{t:"USA",p:"Folarin Balogun",m:"45+5"},{t:"PAR",p:"Mauricio",m:"73"},{t:"USA",p:"Gio Reyna",m:"90+8"}],r:[],s:"An early own goal and a Balogun first-half brace powered the USMNT to a commanding opening win, Gio Reyna adding a late curler after Mauricio's consolation."},
    7:{g:[{t:"AUS",p:"Nestory Irankunda",m:"27"},{t:"AUS",p:"Connor Metcalfe",m:"75"}],r:[],s:"Australia produced a disciplined display in Vancouver, Irankunda becoming the Socceroos' youngest-ever World Cup scorer and Metcalfe sealing it."},
    32:{g:[{t:"USA",p:"Cameron Burgess",m:"11",type:"og"},{t:"USA",p:"Alex Freeman",m:"44"}],r:[],s:"An early Cameron Burgess own goal and Alex Freeman's header just before half-time — awarded after a VAR review overturned an offside flag — earned the USMNT a comfortable win in Seattle, sealing top spot in Group D and a place in the Round of 32."},
    29:{g:[{t:"MAR",p:"Ismael Saibari",m:"1"}],r:[],s:"Ismael Saibari struck after just 72 seconds, racing onto Brahim Díaz's lofted pass and firing into the top corner past Angus Gunn. Scotland rallied in the second half and felt they should have had a penalty for a challenge on McTominay, but couldn't find a way through. Morocco's win keeps them on course for the knockouts."},
    31:{g:[{t:"BRA",p:"Matheus Cunha",m:"23"},{t:"BRA",p:"Matheus Cunha",m:"32"},{t:"BRA",p:"Vinícius Júnior",m:"45+2"}],r:[],s:"Matheus Cunha bundled in a rebound after Johny Placide saved from Vinícius (23'), then curled a superb second into the top corner. Vinícius added a third in first-half stoppage time, finishing a slick move. Brazil eased off after the break but go top of Group C and eliminate Haiti."},
    30:{g:[{t:"PAR",p:"Matías Galarza",m:"1"}],r:[{t:"PAR",p:"Miguel Almirón",m:"45+3"}],s:"Matías Galarza rifled home from distance after just 64 seconds — the fastest goal of the tournament. Paraguay then had Miguel Almirón sent off in first-half stoppage time, controversially shown a straight red for covering his mouth while speaking to Mert Müldür, but held firm with ten men throughout the second half. The defeat eliminates Turkey despite their 32 shots."},
    12:{g:[{t:"GER",p:"Felix Nmecha",m:"6"},{t:"CUW",p:"Livano Comenencia",m:"21"},{t:"GER",p:"Nico Schlotterbeck",m:"38"},{t:"GER",p:"Kai Havertz",m:"45+5",type:"pen"},{t:"GER",p:"Jamal Musiala",m:"47"},{t:"GER",p:"Nathaniel Brown",m:"68"},{t:"GER",p:"Deniz Undav",m:"78"},{t:"GER",p:"Kai Havertz",m:"88"}],r:[],s:"Germany ran riot in Houston, Havertz scoring twice as Nagelsmann's side cruised. Comenencia's strike was Curaçao's first-ever World Cup goal."},
    10:{g:[{t:"CIV",p:"Amad Diallo",m:"90"}],r:[],s:"Substitute Amad Diallo struck a 90th-minute winner in Philadelphia after Ecuador hit the woodwork three times, ending Ecuador's 19-game unbeaten run."},
    9:{g:[{t:"NED",p:"Virgil van Dijk",m:"51"},{t:"JPN",p:"Keito Nakamura",m:"57"},{t:"NED",p:"Crysencio Summerville",m:"64"},{t:"JPN",p:"Daichi Kamada",m:"89"}],r:[],s:"Japan twice came from behind in Dallas, Kamada's late deflected header snatching a dramatic draw against the Dutch."},
    11:{g:[{t:"SWE",p:"Yasin Ayari",m:"7"},{t:"SWE",p:"Alexander Isak",m:"30"},{t:"TUN",p:"Omar Rekik",m:"43"},{t:"SWE",p:"Viktor Gyökeres",m:"59"},{t:"SWE",p:"Mattias Svanberg",m:"84"},{t:"SWE",p:"Yasin Ayari",m:"90+6"}],r:[],s:"Sweden opened emphatically, Ayari bookending the rout with two long-range strikes alongside goals from Isak, Gyökeres and Svanberg."},
    15:{g:[{t:"EGY",p:"Emam Ashour",m:"19"},{t:"BEL",p:"Mohamed Hany",m:"66",type:"og"}],r:[],s:"Ashour, set up by Salah, opened the scoring, but Lukaku forced an own goal from Hany within seconds of coming on to deny Egypt a first World Cup win."},
    13:{g:[{t:"NZL",p:"Elijah Just",m:"7"},{t:"IRN",p:"Ramin Rezaeian",m:"32"},{t:"NZL",p:"Elijah Just",m:"54"},{t:"IRN",p:"Mohammad Mohebbi",m:"64"}],r:[],s:"Elijah Just twice put New Zealand ahead, but Iran responded each time through Rezaeian and a Mohebbi header to earn a 2–2 draw."},
    16:{g:[],r:[],s:"World Cup debutants Cape Verde produced a major shock, holding European champions Spain to a goalless draw behind a heroic display from 40-year-old keeper Vozinha."},
    14:{g:[{t:"KSA",p:"Abdulelah Al-Amri",m:"41"},{t:"URU",p:"Maxi Araújo",m:"80"}],r:[],s:"Al-Amri turned in a rebound to give Saudi Arabia the lead, but Maxi Araújo struck late to rescue a point for Uruguay."},
    17:{g:[{t:"FRA",p:"Kylian Mbappé",m:"66"},{t:"FRA",p:"Bradley Barcola",m:"82"},{t:"SEN",p:"Ibrahim Mbaye",m:"90+5"},{t:"FRA",p:"Kylian Mbappé",m:"90+6"}],r:[],s:"Mbappé's second-half brace, including a stunning stoppage-time strike, made him France's all-time leading scorer. Barcola added a third before Mbaye's late consolation."},
    18:{g:[{t:"NOR",p:"Erling Haaland",m:"29"},{t:"IRQ",p:"Aymen Hussein",m:"39"},{t:"NOR",p:"Erling Haaland",m:"43"},{t:"NOR",p:"Leo Østigård",m:"76"},{t:"NOR",p:"Aymen Hussein",m:"90+6",type:"og"}],r:[],s:"Haaland scored twice on his World Cup debut as Norway beat Iraq. Hussein briefly equalised with a header but later turned into his own net."},
    19:{g:[{t:"ARG",p:"Lionel Messi",m:"17"},{t:"ARG",p:"Lionel Messi",m:"60"},{t:"ARG",p:"Lionel Messi",m:"76"}],r:[],s:"Messi scored his first-ever World Cup hat-trick as defending champions Argentina eased past Algeria, moving level with Klose's all-time goals record."},
    20:{g:[{t:"AUT",p:"Romano Schmid",m:"20"},{t:"JOR",p:"Ali Olwan",m:"50"},{t:"AUT",p:"Yazan Al-Arab",m:"76",type:"og"},{t:"AUT",p:"Marko Arnautović",m:"90+12",type:"pen"}],r:[],s:"Austria won their first World Cup match in 36 years, Schmid's screamer and a late own goal sandwiching Olwan's equaliser before Arnautović's stoppage-time penalty sealed it."},
    24:{g:[{t:"POR",p:"João Neves",m:"6"},{t:"COD",p:"Yoane Wissa",m:"90+5"}],r:[],s:"João Neves headed Portugal ahead early, but Wissa equalised in stoppage time to earn DR Congo their first-ever World Cup goal and point."},
    23:{g:[{t:"COL",p:"Daniel Muñoz",m:"40"},{t:"UZB",p:"Abbosbek Fayzullaev",m:"60"},{t:"COL",p:"Luis Díaz",m:"65"},{t:"COL",p:"Jaminton Campaz",m:"90+9"}],r:[],s:"Muñoz opened the scoring before Fayzullaev levelled, but Luis Díaz restored Colombia's lead and substitute Campaz headed home deep in stoppage time."},
    21:{g:[{t:"ENG",p:"Harry Kane",m:"12",type:"pen"},{t:"CRO",p:"Martin Baturina",m:"36"},{t:"ENG",p:"Harry Kane",m:"42"},{t:"CRO",p:"Petar Musa",m:"45+5"},{t:"ENG",p:"Jude Bellingham",m:"47"},{t:"ENG",p:"Marcus Rashford",m:"85"}],r:[],s:"Kane struck twice in a chaotic four-goal first half that Croatia twice pegged back, before Bellingham restored the lead and Rashford sealed England's winning start."},
    22:{g:[{t:"GHA",p:"Caleb Yirenkyi",m:"90+5"}],r:[],s:"After a goalless, rain-soaked contest in Toronto, Yirenkyi finished a sweeping counterattack in the fifth minute of stoppage time to snatch it for Ghana."},
    33:{g:[{t:"CIV",p:"Franck Kessié",m:"30"},{t:"GER",p:"Deniz Undav",m:"68"},{t:"GER",p:"Deniz Undav",m:"90+4"}],r:[],s:"Substitute Deniz Undav struck twice — volleying in an Amiri cross to cancel out Franck Kessié's opener, then firing the 90+4 winner from Nmecha's pass — to send Germany into the Round of 32."},
    34:{g:[],r:[],s:"Curaçao goalkeeper Eloy Room made 15 saves to earn the World Cup debutants a historic goalless draw. Ecuador had 15 shots without scoring, with Enner Valencia guilty of two glaring misses."},
    36:{g:[{t:"NED",p:"Brian Brobbey",m:"5"},{t:"NED",p:"Brian Brobbey",m:"17"},{t:"NED",p:"Cody Gakpo",m:"47"},{t:"NED",p:"Cody Gakpo",m:"54"},{t:"SWE",p:"Anthony Elanga",m:"59"},{t:"NED",p:"Crysencio Summerville",m:"89"}],r:[],s:"Brian Brobbey and Cody Gakpo each scored twice as the Netherlands swept Sweden aside in Houston to go top of Group F. Elanga pulled one back before Summerville completed the rout off the bench."},
    35:{g:[{t:"JPN",p:"Daichi Kamada",m:"4"},{t:"JPN",p:"Ayase Ueda",m:"30"},{t:"JPN",p:"Junya Ito",m:"69"},{t:"JPN",p:"Ayase Ueda",m:"83"}],r:[],s:"Japan made history as the first AFC side to score four in a World Cup match, Ayase Ueda netting twice. The win eliminates Tunisia and puts Japan level on points atop Group F."},
    40:{g:[{t:"ESP",p:"Lamine Yamal",m:"10"},{t:"ESP",p:"Mikel Oyarzabal",m:"21"},{t:"ESP",p:"Mikel Oyarzabal",m:"24"},{t:"ESP",p:"Hassan Al-Tambakti",m:"48",type:"og"}],r:[],s:"Spain were ruthless, Lamine Yamal opening early before Mikel Oyarzabal struck twice in three first-half minutes. An Al-Tambakti own goal just after the break completed a 4–0 win that sends Spain top of Group H and leaves Saudi Arabia bottom."},
    39:{g:[],r:[{t:"BEL",p:"Nathan Ngoy",m:"66"}],s:"A goalless draw in Los Angeles left Group G wide open. Belgium were reduced to ten men when Nathan Ngoy was sent off in the 66th minute for hauling down Mehdi Taremi as the last man, and Iran had a first-half Taremi free-kick effort ruled out for offside by VAR. All four teams can still advance going into the final matchday."},
    37:{g:[{t:"NZL",p:"Finn Surman",m:"16"},{t:"EGY",p:"Mostafa Zico",m:"58"},{t:"EGY",p:"Mohamed Salah",m:"67"},{t:"EGY",p:"Trézéguet",m:"82"}],r:[],s:"Finn Surman headed New Zealand into a deserved half-time lead, but Egypt roared back after the break. Mostafa Zico equalised, then set up Mohamed Salah before Trézéguet's diving header completed the comeback — Egypt's first World Cup win since their 1934 debut."},
    38:{g:[{t:"CPV",p:"Kevin Pina",m:"21"},{t:"URU",p:"Maxi Araújo",m:"44"},{t:"URU",p:"Agustín Canobbio",m:"45+6"},{t:"CPV",p:"Hélio Varela",m:"61"}],r:[],s:"Kevin Pina's stunning long-range free-kick put Cape Verde ahead before Maxi Araújo and Agustín Canobbio struck either side of half-time to turn it around for Uruguay. Hélio Varela levelled just after the hour to earn the World Cup debutants a second remarkable draw."},
    41:{g:[{t:"FRA",p:"Kylian Mbappé",m:"14"},{t:"FRA",p:"Kylian Mbappé",m:"54"},{t:"FRA",p:"Ousmane Dembélé",m:"66"}],r:[],s:"Mbappé struck twice on his 100th cap and Dembélé added his first-ever World Cup goal to send France into the knockouts. The match made history as the first World Cup game suspended for weather, a lightning storm delaying the second half for over two hours."},
    42:{g:[{t:"NOR",p:"Marcus Pedersen",m:"43"},{t:"NOR",p:"Erling Haaland",m:"48"},{t:"SEN",p:"Ismaila Sarr",m:"53"},{t:"NOR",p:"Erling Haaland",m:"58"},{t:"SEN",p:"Ismaila Sarr",m:"90+3"}],r:[],s:"Haaland's second-half brace sealed Norway's place in the Round of 32 and made him their all-time leading World Cup scorer. Ismaila Sarr struck twice for Senegal, including a stoppage-time goal that set up a nervy finish, but it was not enough."},
    44:{g:[{t:"ARG",p:"Lionel Messi",m:"38"},{t:"ARG",p:"Lionel Messi",m:"90+5"}],r:[],s:"Messi scored either side of the match to take his World Cup tally to 18 — breaking Miroslav Klose's all-time men's record of 16 — as defending champions Argentina beat Austria to reach the knockouts."},
    43:{g:[{t:"JOR",p:"Nizar Al-Rashdan",m:"36"},{t:"ALG",p:"Nadhir Benbouali",m:"69"},{t:"ALG",p:"Amine Gouiri",m:"82"}],r:[],s:"World Cup debutants Jordan led through Al-Rashdan's fine finish, but substitute Benbouali headed in a Mahrez corner and Gouiri poked home a late winner to keep Algeria alive and eliminate Jordan."},
    48:{g:[{t:"POR",p:"Cristiano Ronaldo",m:"6"},{t:"POR",p:"Nuno Mendes",m:"17"},{t:"POR",p:"Cristiano Ronaldo",m:"39"},{t:"POR",p:"Abduvohid Nematov",m:"60",type:"og"},{t:"POR",p:"Rafael Leão",m:"87"}],r:[],s:"Cristiano Ronaldo's first-half brace made him the first player to score at six different World Cups as Portugal routed Uzbekistan in Houston. Nuno Mendes, an own goal and substitute Rafael Leão completed the rout."},
    45:{g:[],r:[],s:"England were held to a goalless draw by a well-drilled Ghana but moved closer to the knockout phase. England struggled to break through, with O'Reilly hitting the crossbar and a stoppage-time Guéhi header cleared off the line."},
    47:{g:[{t:"COL",p:"Daniel Muñoz",m:"76"}],r:[],s:"Daniel Muñoz headed home the only goal in the 76th minute to send Colombia into the knockout stage with a game to spare. DR Congo goalkeeper Lionel Mpasi kept the score down with eight saves, but Colombia's pressure finally told."},
    46:{g:[{t:"CRO",p:"Ante Budimir",m:"54"}],r:[],s:"Substitute Ante Budimir prodded home Josip Stanišić's cross at the far post nine minutes after coming on to give Croatia a vital 1–0 win and revive their campaign. A second straight 1–0 defeat eliminates Panama."},
    55:{g:[{t:"CIV",p:"Nicolas Pépé",m:"7"},{t:"CIV",p:"Nicolas Pépé",m:"64"}],r:[],s:"Nicolas Pépé struck in each half — slotting home early after Curaçao failed to clear, then curling a sumptuous second beyond Eloy Room — to send Ivory Coast into the World Cup knockout stage for the first time as Group E runners-up. Debutants Curaçao finish bottom."},
    56:{g:[{t:"GER",p:"Leroy Sané",m:"2"},{t:"ECU",p:"Nilson Angulo",m:"9"},{t:"ECU",p:"Gonzalo Plata",m:"77"}],r:[],s:"Leroy Sané put Germany ahead inside two minutes, but Nilson Angulo levelled with an exquisite finish from range and Gonzalo Plata poked home a late winner. Ecuador's comeback win secured their place in the last 32 as one of the best third-placed teams; Germany still topped Group E."},
    57:{g:[{t:"JPN",p:"Daizen Maeda",m:"55"},{t:"SWE",p:"Anthony Elanga",m:"62"}],r:[],s:"Daizen Maeda slid Japan ahead after intricate build-up before Anthony Elanga answered with a stunning solo run and curled finish. The 1–1 draw sends both through — Japan second in Group F to face Brazil, Sweden third as one of the best third-placed teams."},
    58:{g:[{t:"NED",p:"Ellyes Skhiri",m:"3",type:"og"},{t:"NED",p:"Brian Brobbey",m:"7"},{t:"TUN",p:"Hazem Mastouri",m:"54"},{t:"NED",p:"Jan Paul van Hecke",m:"62"}],r:[],s:"Ellyes Skhiri sliced Denzel Dumfries' cross into his own net inside three minutes and Brian Brobbey quickly added his third goal of the tournament. Hazem Mastouri headed in a corner to give Tunisia hope, but Jan Paul van Hecke glanced home his first World Cup goal to seal a 3–1 win and confirm the Netherlands as Group F winners."},
    59:{g:[{t:"USA",p:"Auston Trusty",m:"3"},{t:"TUR",p:"Arda Güler",m:"10"},{t:"TUR",p:"Orkun Kökçü",m:"31"},{t:"USA",p:"Sebastian Berhalter",m:"49"},{t:"TUR",p:"Kaan Ayhan",m:"90+8"}],r:[],s:"Auston Trusty headed the USA ahead inside three minutes, but Arda Güler and Orkun Kökçü turned it around for Turkey before Sebastian Berhalter levelled. Kaan Ayhan won it with the last kick of the game in the 98th minute. The USA had already secured top spot in Group D, while Turkey finished bottom despite their first goals of the tournament."},
    60:{g:[],r:[],s:"A goalless draw sent Australia through as Group D runners-up. Paraguay finished third and must wait to see if they advance as one of the best third-placed teams."},
    61:{g:[{t:"FRA",p:"Ousmane Dembélé",m:"7"},{t:"FRA",p:"Ousmane Dembélé",m:"20"},{t:"NOR",p:"Thelo Aasgaard",m:"21"},{t:"FRA",p:"Ousmane Dembélé",m:"32"},{t:"FRA",p:"Désiré Doué",m:"90+4"}],r:[],s:"Ousmane Dembélé scored a first-half hat-trick — the first in the opening half of a World Cup match since 1994 — as France swept Norway aside to win Group I with a perfect record. Thelo Aasgaard briefly replied and Norway missed a second-half penalty before Désiré Doué added a late fourth. Both sides advance."},
    62:{g:[{t:"SEN",p:"Habib Diarra",m:"4"},{t:"SEN",p:"Ismaila Sarr",m:"56"},{t:"SEN",p:"Pape Gueye",m:"59"},{t:"SEN",p:"Pape Gueye",m:"71"},{t:"SEN",p:"Iliman Ndiaye",m:"82"}],r:[{t:"IRQ",p:"Rebin Sulaka",m:"13"}],s:"Habib Diarra struck inside four minutes and Iraq's Rebin Sulaka was sent off on 13 minutes for denying Sadio Mané a clear chance. Senegal ran riot after the break through Ismaila Sarr, a Pape Gueye double and Iliman Ndiaye for a historic 5–0 win, the biggest by an African side at a World Cup. Senegal finish third and await the third-place rankings."},
    63:{g:[{t:"ESP",p:"Álex Baena",m:"42"}],r:[{t:"URU",p:"Agustín Canobbio",m:"90+4"}],s:"Álex Baena's first-time strike just before half-time squirmed through Fernando Muslera to win it for Spain, who top Group H. Uruguay had Agustín Canobbio sent off in stoppage time for a studs-up lunge and contact with the referee, and went out on goal difference."},
    64:{g:[],r:[],s:"A goalless draw saw World Cup debutants Cape Verde reach the knockout stage as Group H runners-up after three draws, setting up a last-32 tie with Argentina. Saudi Arabia finished bottom and were eliminated."},
    65:{g:[{t:"EGY",p:"Mahmoud Saber",m:"5"},{t:"IRN",p:"Ramin Rezaeian",m:"14"}],r:[],s:"Mahmoud Saber fired Egypt ahead inside five minutes, set up by Mohamed Salah, but Ramin Rezaeian levelled for Iran on 14 minutes. Iran thought they had won it deep in stoppage time through Shoja Khalilzadeh, but VAR ruled it out for offside. Egypt advance second in Group G; Iran finish third and await the third-place rankings."},
    66:{g:[{t:"BEL",p:"Leandro Trossard",m:"28"},{t:"BEL",p:"Leandro Trossard",m:"50"},{t:"BEL",p:"Kevin De Bruyne",m:"66"},{t:"NZL",p:"Elijah Just",m:"84"},{t:"BEL",p:"Romelu Lukaku",m:"86"},{t:"BEL",p:"Alexis Saelemaekers",m:"90+4"}],r:[],s:"Leandro Trossard scored in each half and Kevin De Bruyne curled in from outside the box as Belgium came good to win Group G. Elijah Just grabbed a consolation for New Zealand before Romelu Lukaku and Alexis Saelemaekers completed the 5–1 rout."},
    67:{g:[{t:"ENG",p:"Jude Bellingham",m:"62"},{t:"ENG",p:"Harry Kane",m:"67"}],r:[],s:"Jude Bellingham poked in a Bukayo Saka corner before Harry Kane headed home Bellingham's cross to become England's all-time leading World Cup scorer with his 11th goal at the finals, one ahead of Gary Lineker. England top Group L."},
    68:{g:[{t:"CRO",p:"Petar Sučić",m:"31"},{t:"GHA",p:"Derrick Luckassen",m:"73"},{t:"CRO",p:"Nikola Vlašić",m:"83"}],r:[],s:"Petar Sučić curled in a fine first-half opener for Croatia before Derrick Luckassen levelled from an Ernest Nuamah free-kick. Nikola Vlašić headed home a Luka Modrić corner on 83 minutes to win it and send Croatia through as Group L runners-up. Ghana finished third and qualified as one of the best third-placed teams."},

    71:{g:[{t:"AUT",p:"Marko Arnautović",m:"28"},{t:"ALG",p:"Rafik Belghali",m:"44"},{t:"AUT",p:"Marcel Sabitzer",m:"55"},{t:"ALG",p:"Riyad Mahrez",m:"60"},{t:"ALG",p:"Riyad Mahrez",m:"90+3"},{t:"AUT",p:"Saša Kalajdžić",m:"90+6"}],r:[],s:"In a match both teams needed only to draw, Saša Kalajdžić's 96th-minute header rescued a 3–3 thriller. Riyad Mahrez's brace, including a stoppage-time strike, had looked to win it for Algeria after Arnautović and Sabitzer twice put Austria ahead. The draw sends Austria through as Group J runners-up and Algeria as one of the best third-placed teams, eliminating Iran."},
    72:{g:[{t:"ARG",p:"Giovani Lo Celso",m:"19"},{t:"ARG",p:"Lautaro Martínez",m:"31",type:"pen"},{t:"JOR",p:"Musa Al-Tamari",m:"55"},{t:"ARG",p:"Lionel Messi",m:"80"}],r:[],s:"With Argentina already through as group winners, Giovani Lo Celso and a Lautaro Martínez penalty had La Albiceleste cruising before Musa Al-Tamari pulled one back. Lionel Messi came off the bench and scored to cap a 3–1 win, closing the group with a perfect nine points. Jordan finished bottom on their World Cup debut."},
    73:{g:[{t:"CAN",p:"Stephen Eustáquio",m:"90+2"}],r:[],s:"Stephen Eustáquio volleyed home in the second minute of stoppage time to send Canada past South Africa and into the Round of 16 for the first time in their history. Alphonso Davies made his tournament debut off the bench after a group-stage hamstring injury."},
    74:{g:[{t:"PAR",p:"Julio Enciso",m:"42"},{t:"GER",p:"Kai Havertz",m:"54"}],r:[],s:"Paraguay stunned Germany, Julio Enciso's first-half strike cancelled out by Kai Havertz before Jonathan Tah had an extra-time header ruled out by VAR. After a 1–1 draw across 120 minutes, Paraguay won 4–3 on penalties — the first time Germany have ever lost a World Cup shootout."},
